<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 96" role="img" aria-label="REBORN">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="45%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="40%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Soft card background -->
  <rect x="0" y="4" width="378" height="88" rx="18" fill="#FFFFFF"/>
  <rect x="0" y="4" width="378" height="88" rx="18" fill="url(#barGrad)" opacity="0.06"/>

  <!-- Icon badge -->
  <rect x="8" y="12" width="72" height="72" rx="18" fill="url(#badgeGrad)" filter="url(#softGlow)"/>
  <!-- Orbit ring -->
  <circle cx="44" cy="42" r="20" fill="none" stroke="url(#ringGrad)" stroke-width="3.5" opacity="0.95"/>
  <circle cx="44" cy="42" r="11" fill="#FFFFFF" opacity="0.18"/>
  <!-- Spark / reborn mark -->
  <path d="M44 28 L47.2 38.5 L58 41 L47.2 43.5 L44 54 L40.8 43.5 L30 41 L40.8 38.5 Z"
        fill="#FFFFFF" opacity="0.98"/>
  <circle cx="58" cy="30" r="3" fill="#FDE68A"/>
  <circle cx="30" cy="52" r="2.2" fill="#67E8F9"/>
  <text x="44" y="72" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="8.5" font-weight="900" fill="#FFFFFF" letter-spacing="0.8">REBORN</text>

  <!-- Wordmark -->
  <text x="96" y="42" font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="32" font-weight="900" fill="url(#wordGrad)" letter-spacing="2">REBORN</text>
  <text x="98" y="62" font-family="Arial, Helvetica, sans-serif"
        font-size="11.5" font-weight="700" fill="#475569" letter-spacing="0.3">PT TELETAMA ARTHA MANDIRI</text>
  <rect x="98" y="70" width="210" height="5" rx="2.5" fill="url(#barGrad)"/>
  <text x="98" y="88" font-family="Arial, Helvetica, sans-serif"
        font-size="9.5" font-weight="800" fill="#7C3AED" letter-spacing="1.6">DASHBOARD · UJUNG WETAN</text>
</svg>
