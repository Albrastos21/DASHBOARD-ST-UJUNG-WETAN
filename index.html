        <button type="button" id="hlNext">Next ›</button>
      </div>
      <div class="hl-dots" id="hlDots"></div>
    `;
    // dots compact: show brand/depo/sales segment markers only first 12
    const dots = document.getElementById('hlDots');
    const maxDots = Math.min(hlSlides.length, 16);
    const step = Math.max(1, Math.ceil(hlSlides.length / maxDots));
    let html = '';
    for (let i = 0; i < hlSlides.length; i += step) {
      html += `<button class="hl-dot ${i<=hlIdx && hlIdx<i+step ? 'on':''}" data-i="${i}" type="button"></button>`;
    }
    dots.innerHTML = html;
    dots.querySelectorAll('.hl-dot').forEach(d => {
      d.onclick = () => { hlIdx = +d.dataset.i; paintHighlight(); restartHlTimer(); };
    });
    document.getElementById('hlPrev').onclick = () => {
      hlIdx = (hlIdx - 1 + hlSlides.length) % hlSlides.length;
      paintHighlight(); restartHlTimer();
    };
    document.getElementById('hlNext').onclick = () => {
      hlIdx = (hlIdx + 1) % hlSlides.length;
      paintHighlight(); restartHlTimer();
    };
  }
  function restartHlTimer() {
    clearInterval(hlTimer);
    hlTimer = setInterval(() => {
      hlIdx = (hlIdx + 1) % Math.max(hlSlides.length, 1);
      paintHighlight();

    Jember: '#ea580c',
    Banyuwangi: '#7c3aed',
    Pamekasan: '#db2777',

  const DEPO_LINE_PALETTE = ['#1d4ed8', '#0d9488', '#ea580c', '#7c3aed', '#db2777', '#0891b2', '#ca8a04', '#64748b'];
  function depoLineColor(depo, idx = 0) {
    return DEPO_LINE_COLORS[depo] || DEPO_LINE_PALETTE[idx % DEPO_LINE_PALETTE.length];

  function renderDepo(rows, dealers) {
    const el = document.getElementById('page-depo');
    if (!el) return;
    const focusBrand = focusBrandOf();
    const focus = rows.filter(r => r.brand === focusBrand);
    const byDepo = new Map(); // depo -> {qty, amt, bo:Set, dealerAmt:Map}
    const allDepo = new Map();
    for (const r of rows) {
      if (!allDepo.has(r.depo)) allDepo.set(r.depo, 0);
      allDepo.set(r.depo, allDepo.get(r.depo) + r.amt);
    }
    for (const r of focus) {
      if (!byDepo.has(r.depo)) byDepo.set(r.depo, { qty: 0, amt: 0, bo: new Set(), dealerAmt: new Map() });
      const o = byDepo.get(r.depo);
      o.qty += r.qty;
      o.amt += r.amt;
    }
    for (const r of (dealers || [])) {
      if ((r.brand || 'SAMSUNG') !== focusBrand) continue;
      if (!byDepo.has(r.depo)) byDepo.set(r.depo, { qty: 0, amt: 0, bo: new Set(), dealerAmt: new Map() });
      const o = byDepo.get(r.depo);
      const name = r.dealer || r.soldto;
      if (!name) continue;
      o.bo.add(name);
      o.dealerAmt.set(name, (o.dealerAmt.get(name) || 0) + (Number(r.amt) || 0));
    }
    // QVO per DEPO = dealer dgn total Nett No Tax (filter aktif) > threshold
    for (const [, v] of byDepo) {
      let qvoN = 0;
      for (const amt of v.dealerAmt.values()) {
        if ((Number(amt) || 0) > QVO_THRESHOLD) qvoN += 1;
      }
      v.qvo = qvoN;
    }
    const list = [...byDepo.entries()].sort((a, b) => b[1].amt - a[1].amt);
    const tot = list.reduce((s, [, v]) => s + v.amt, 0);
    const totalQvoDepo = list.reduce((s, [, v]) => s + (v.qvo || 0), 0);

    // Achievement BO / QVO per bulan · garis dipisah per tahun
    // QVO = dealer dgn value Nett No Tax > 18.081.081
    const focusDealers = (dealers || []).filter(r => (r.brand || 'SAMSUNG') === focusBrand);
    const depoYears = [...new Set(focusDealers.map(r => String(r.year || '')).filter(Boolean))].sort();
    const yearsUse = depoYears.length
      ? depoYears
      : (!isAll(state.year) ? state.year.map(String) : ['2025', '2026']);
    const monthLabels = (DATA?.meta?.months || MONTHS).filter(m =>
      focusDealers.some(r => r.month === m)
    );
    const boMonthLabels = monthLabels.length
      ? monthLabels
      : [...new Set(focusDealers.map(r => r.month).filter(Boolean))].sort((a, b) => monthKey(a) - monthKey(b));

    // year -> month -> Set(dealer)  |  year -> month -> Map(dealer, amt)
    const boByYearMonth = new Map();
    const amtByYearMonth = new Map();
    for (const r of focusDealers) {
      const y = String(r.year || yearsUse[0] || '');
      const m = r.month || 'Unknown';
      const name = r.dealer || r.soldto;
      if (!name) continue;
      if (!boByYearMonth.has(y)) boByYearMonth.set(y, new Map());
      if (!boByYearMonth.get(y).has(m)) boByYearMonth.get(y).set(m, new Set());
      boByYearMonth.get(y).get(m).add(name);
      if (!amtByYearMonth.has(y)) amtByYearMonth.set(y, new Map());
      if (!amtByYearMonth.get(y).has(m)) amtByYearMonth.get(y).set(m, new Map());
      const dm = amtByYearMonth.get(y).get(m);
      dm.set(name, (dm.get(name) || 0) + (Number(r.amt) || 0));
    }

    const seriesBoByYear = Object.fromEntries(yearsUse.map(y => [
      y,
      boMonthLabels.map(m => boByYearMonth.get(y)?.get(m)?.size || 0)
    ]));
    const seriesQvoByYear = Object.fromEntries(yearsUse.map(y => [
      y,
      boMonthLabels.map(m => {
        const dm = amtByYearMonth.get(y)?.get(m);
        if (!dm) return 0;
        let n = 0;
        for (const amt of dm.values()) if ((Number(amt) || 0) > QVO_THRESHOLD) n += 1;
        return n;
      })
    ]));

    const everbillSet = new Set();
    const qvoEverSet = new Set();
    for (const [, byM] of boByYearMonth) for (const set of byM.values()) for (const d of set) everbillSet.add(d);
    for (const [, byM] of amtByYearMonth) {
      for (const dm of byM.values()) {
        for (const [name, amt] of dm) if ((Number(amt) || 0) > QVO_THRESHOLD) qvoEverSet.add(name);
      }
    }
    const allBoVals = yearsUse.flatMap(y => seriesBoByYear[y] || []);
    const allQvoVals = yearsUse.flatMap(y => seriesQvoByYear[y] || []);

    // —— Weekly series · garis per DEPO ——
    // week -> depo -> { rev, bo:Set, dealerAmt:Map }
    const weekDepoMap = new Map();
    const depoSetWeek = new Set();
    for (const r of focusDealers) {
      const w = r.week || '';
      const dep = r.depo || 'Unknown';
      if (!w || dep === 'Unknown') continue;
      const name = r.dealer || r.soldto;
      if (!weekDepoMap.has(w)) weekDepoMap.set(w, new Map());
      const byD = weekDepoMap.get(w);
      if (!byD.has(dep)) byD.set(dep, { rev: 0, bo: new Set(), dealerAmt: new Map() });
      const o = byD.get(dep);
      o.rev += Number(r.amt) || 0;
      if (name) {
        o.bo.add(name);
        o.dealerAmt.set(name, (o.dealerAmt.get(name) || 0) + (Number(r.amt) || 0));
      }
      depoSetWeek.add(dep);

  /** Normalisasi Ship/Sold to Code (= BP sheet SALES) untuk VLOOKUP */
  function normBp(bp) {
    let t = String(bp ?? '').trim();
    if (!t || t === '-' || t.toLowerCase() === 'nan') return '';
    if (t.endsWith('.0') && /^\d+\.0$/.test(t)) t = t.slice(0, -2);
    // hilangkan spasi / leading zeros berlebih pada angka murni
    if (/^\d+$/.test(t)) t = String(parseInt(t, 10));
    return t;
  }

  /**
   * Index achievement MASTER (Nett with Tax) · VLOOKUP by Ship/Sold to Code SAJA.
   * Jangan pakai nama dealer — nama hanya label di tabel SALES.
   */
  function buildAchIndex() {
    const byCode = new Map(); // ship_to_code / BP -> {SAMSUNG, XIAOMI, TECNO, APPLE, qty}
    const empty = () => ({ SAMSUNG:0, XIAOMI:0, TECNO:0, APPLE:0, qty:0 });

    const rows = (DATA.ach_grain || []).filter(r => passFilter(r));

    for (const r of rows) {
      const code = normBp(r.bp || r.ship_to_code);
      if (!code) continue;
      if (!byCode.has(code)) byCode.set(code, empty());
      const o = byCode.get(code);
      if (o[r.brand] !== undefined) o[r.brand] += Number(r.amt_tax) || 0;
      o.qty += Number(r.qty) || 0;
    }
    return { byCode };
  }

  function lookupAch(d, achIdx) {
    // Hanya VLOOKUP by Ship/Sold to Code (kolom BP mapping sales)
    const code = normBp(d.bp);
    if (code && achIdx.byCode.has(code)) return achIdx.byCode.get(code);
    return { SAMSUNG:0, XIAOMI:0, TECNO:0, APPLE:0, qty:0 };
  }

  /**
   * Kalkulator (revisi):
   * Account SHADOW | EC | NSP = hanya 1 aktif (saling eksklusif); lainnya = 0.
   * Filter yang SEDANG DIGUNAKAN (YA / account dipilih) → ditambahkan ke Margin
   *   dan (kecuali PWP selalu) juga dipakai di Harga Lowest sesuai rumus.
   *
   * Margin = (RRP − STP) + REBATE_on + ACCOUNT_aktif_satu
   *   (tanpa Cashback & Trade In)
   * Harga Lowest = STP − (PWP + CASHBACK_on + TRADE_IN_on + REBATE_on + ACCOUNT_aktif_satu)
   * Margin % = Margin ÷ RRP × 100
   *
   * Account TIDAK = tidak ada penambahan account di Margin maupun Lowest.
   */
  function computeCalcMargin(item, st) {
    const rrp = Number(item.rrp) || 0;
    const stp = Number(item.stp) || 0;
    const cashbackRaw = Number(item.cashback_regular) || 0;
    const tradeInRaw = Number(item.trade_in) || 0;
    const pwp = Number(item.pwp) || 0;
    const shadowRaw = Number(item.shadow) || 0;
    const ecRaw = Number(item.ec_partnership) || 0;
    const nspRaw = Number(item.nsp) || 0;
    const rebateRaw = Number(item.rebate_1pct) || 0;

    const useCb = st.cashback === 'YA';
    const useTi = st.tradeIn === 'YA';
    const useRebate = (st.rebate || 'YA') === 'YA';

    let acc = st.account || 'TIDAK';
    if (acc === 'SEMUA') acc = 'TIDAK';
    if (!['SHADOW', 'EC', 'NSP', 'TIDAK'].includes(acc)) acc = 'TIDAK';

    // Hanya 1 account aktif; lainnya ditutup total
    const useShadow = acc === 'SHADOW';
    const useEc = acc === 'EC';
    const useNsp = acc === 'NSP';

    const cashback = useCb ? cashbackRaw : 0;
    const tradeIn = useTi ? tradeInRaw : 0;
    const rebate = useRebate ? rebateRaw : 0;
    const shadow = useShadow ? shadowRaw : 0;
    const ec = useEc ? ecRaw : 0;
    const nsp = useNsp ? nspRaw : 0;

    // Margin: hanya (RRP−STP) + rebate aktif + account aktif (tanpa cashback & trade in)
    const filterAddMargin = rebate + shadow + ec + nsp;

    const baseSpread = rrp - stp;
    const margin = baseSpread + filterAddMargin;
    const marginPct = rrp ? (margin / rrp) : 0;

    // Harga Lowest = STP − (PWP + CB + TI + REBATE + EC + SHADOW + NSP) [hanya yang aktif]
    const lowestDeduct = pwp + cashback + tradeIn + rebate + shadow + ec + nsp;
    const hargaLowest = stp - lowestDeduct;

    return {
      rrp, stp, pwp,
      cashback, cashbackRaw, useCb,
      tradeIn, tradeInRaw, useTi,
      shadowRaw, ecRaw, nspRaw, rebateRaw,
      // filter aktif (sama untuk Margin + / Lowest −)
      shadow, ec, nsp, rebate,
      useShadow, useEc, useNsp, useRebate,
      shadowForMargin: shadow, ecForMargin: ec, nspForMargin: nsp, rebateForMargin: rebate,
      shadowForLowest: shadow, ecForLowest: ec, nspForLowest: nsp, rebateForLowest: rebate,
      useShadowOnLowest: useShadow, useEcOnLowest: useEc, useNspOnLowest: useNsp, useRebateOnLowest: useRebate,
      addShadowToMargin: useShadow, addEcToMargin: useEc, addNspToMargin: useNsp, addRebateToMargin: useRebate,
      accountMode: acc,
      baseSpread, filterAdd: filterAddMargin, filterAddMargin,
      margin, marginPct,
      lowestDeduct, hargaLowest,
    };
  }

  function renderSalesCalculator(host) {

      return;
    }

    // Unik by Material Description saja (tanpa CODE)
    const byMaterial = new Map();
    for (const it of rawItems) {
      const mat = String(it.material || '').trim();
      if (!mat || byMaterial.has(mat)) continue;
      byMaterial.set(mat, it);
    }
    const items = [...byMaterial.values()].sort((a, b) =>
      String(a.material).localeCompare(String(b.material), 'id')
    );

    if (!calcState.material || !byMaterial.has(calcState.material)) {
      calcState.material = items[0] ? items[0].material : '';
    }
    const item = byMaterial.get(calcState.material) || items[0];
    const m = computeCalcMargin(item, calcState);
    const marginNeg = m.margin < 0;
    const lowestNeg = m.hargaLowest < 0;

    const fmtRpFull = (n) => 'Rp ' + Math.round(Number(n) || 0).toLocaleString('id-ID');
    const row = (label, val, {cls='', used=true, raw=null, note='', sign='−'} = {}) => {
      const rawHint = (!used && raw != null && Number(raw) !== 0)

      if (used) {
        const n = Number(val) || 0;
        if (!n) valText = sign === '+' ? '+ ' + fmtRpFull(0) : '−';

      return `<tr class="${cls} ${used ? '' : 'off'}">

        <div class="sales-table-wrap" style="margin-bottom:12px">

              ${row('EC PARTNERSHIP', m.ec, {cls:'deduct', used:m.useEc, raw:m.ecRaw, sign:'+', note: m.useEc ? 'Account = EC (hanya ini)' : 'Ditutup'})}
              ${row('NSP', m.nsp, {cls:'deduct', used:m.useNsp, raw:m.nspRaw, sign:'+', note: m.useNsp ? 'Account = NSP (hanya ini)' : 'Ditutup'})}
              <tr class="total">
                <td class="comp"><strong>MARGIN</strong><span class="comp-note">(RRP − STP) + Rebate + Account aktif · tanpa Cashback & Trade In</span></td>
                <td class="n" style="${marginNeg?'color:#b91c1c':''}">${fmtRpFull(m.margin)}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="sales-table-wrap">
          <table class="calc-break">
            <thead>
              <tr>
                <th>2) Harga Lowest · STP − (PWP + program filter aktif)</th>
                <th class="n">Nilai</th>
              </tr>
            </thead>
            <tbody>
              <tr class="rrp">
                <td class="comp"><strong>STP</strong></td>
                <td class="n">${fmtRpFull(m.stp)}</td>
              </tr>
              ${row('PWP', m.pwp, {cls:'deduct', used:true, note:'Selalu dihitung'})}
              ${row('CASHBACK REGULAR', m.cashback, {cls:'deduct', used:m.useCb, raw:m.cashbackRaw, note: m.useCb ? 'Filter YA' : 'Filter TIDAK'})}
              ${row('TRADE IN (UP TO)', m.tradeIn, {cls:'deduct', used:m.useTi, raw:m.tradeInRaw, note: m.useTi ? 'Filter YA' : 'Filter TIDAK'})}
              ${row('REBATE 1%', m.rebate, {cls:'deduct', used:m.useRebate, raw:m.rebateRaw, note: m.useRebate ? 'Filter YA' : 'Filter TIDAK'})}
              ${row('EC PARTNERSHIP', m.ec, {cls:'deduct', used:m.useEc, raw:m.ecRaw, note: m.useEc ? 'Account = EC saja' : 'Ditutup'})}
              ${row('SHADOW', m.shadow, {cls:'deduct', used:m.useShadow, raw:m.shadowRaw, note: m.useShadow ? 'Account = SHADOW saja' : 'Ditutup'})}
              ${row('NSP', m.nsp, {cls:'deduct', used:m.useNsp, raw:m.nspRaw, note: m.useNsp ? 'Account = NSP saja' : 'Ditutup'})}

      options: [
        { v: 'YA', t: 'YA' },
        { v: 'TIDAK', t: 'TIDAK' },
      ],
      selected: [calcState.rebate || 'YA'],
      allLabel: 'Rebate',
      searchPlaceholder: 'YA / TIDAK',
      single: true,
      allowEmpty: false,
      onChange: (vals) => {
        calcState.rebate = vals[0] === 'TIDAK' ? 'TIDAK' : 'YA';
        refresh();
      },
    });
  }

  function renderReviewDealer() {
    const el = document.getElementById('page-review-dealer');
    if (!el) return;

    const SEG_FOCUS = ['PREMIUM', 'ULC', 'ENTRY', 'MID', 'MASS', 'HIGH', 'TABLET', 'ACCS'];
    const matchSegFocus = (raw) => {
      const u = String(raw || '').toUpperCase().trim();
      if (!u) return null;
      if (SEG_FOCUS.includes(u)) return u;
      if (u.startsWith('PREMIUM')) return 'PREMIUM';
      if (u.startsWith('ULC')) return 'ULC';
      if (u.startsWith('ENTRY')) return 'ENTRY';
      if (u === 'MID' || u.startsWith('MID ')) return 'MID';
      if (u.startsWith('MASS')) return 'MASS';
      if (u === 'HIGH' || u.startsWith('HIGH ')) return 'HIGH';
      if (u === 'TABLET' || (u.startsWith('TABLET') && !u.includes('ACCESS'))) return 'TABLET';
      if (u === 'ACCS' || u === 'ACC') return 'ACCS';
      return null;
    };

    const passRD = (r) => {
      if (r.depo === 'Unknown') return false;
      if (!matchMulti(state.brand, r.brand)) return false;
      if (!matchMulti(revDealerBrandFilter, r.brand)) return false;
      if (!matchMulti(state.depo, r.depo)) return false;
      if (!matchMulti(state.quartal, r.quartal)) return false;
      if (!matchMulti(state.month, r.month)) return false;
      if (!matchMulti(state.week, r.week)) return false;
      if (!matchMulti(state.year, r.year)) return false;
      return true;
    };

    const grain = (DATA.grain || []).filter(passRD);
    const dealersAll = (DATA.dealer_grain || []).filter(passRD);
    const dealerFilter = asArr(revDealerNameFilter);
    const hasDealerFilter = !isAll(dealerFilter);
    let dealersF = dealersAll;
    if (hasDealerFilter) {
      dealersF = dealersAll.filter(r => matchMulti(dealerFilter, r.dealer || r.soldto));
    }

    const years = ['2025', '2026'];
    const yearColors = { '2025': '#94a3b8', '2026': '#1d4ed8' };
    const touchBar = { categoryPercentage: 0.72, barPercentage: 1.0 };
    const monthsOrd = (DATA.meta?.months || MONTHS).slice();

    // ——— Agregat per dealer (pass ringan dulu; SKU detail hanya untuk fokus + peer) ———
    const dealerAgg = new Map(); // name -> stats
    const ensureDealer = (name) => {
      if (!dealerAgg.has(name)) {
        dealerAgg.set(name, {
          name,
          city: '',
          a25: 0, a26: 0,
          q25: 0, q26: 0,
          months25: new Set(), months26: new Set(),
          skus: new Map(),
          segs: Object.fromEntries(SEG_FOCUS.map(s => [s, { a25: 0, a26: 0, q25: 0, q26: 0 }])),
          brands: { '2025': {}, '2026': {} },
          _skuReady: false,
        });
      }
      return dealerAgg.get(name);
    };

    for (const r of dealersAll) {
      const name = r.dealer || r.soldto;
      if (!name) continue;
      const y = String(r.year || '');
      if (!years.includes(y)) continue;
      const o = ensureDealer(name);
      const amt = Number(r.amt) || 0;
      const qty = Number(r.qty) || 0;
      if (r.city) o.city = r.city;
      if (y === '2025') {
        o.a25 += amt; o.q25 += qty;
        if (r.month) o.months25.add(r.month);
      } else {
        o.a26 += amt; o.q26 += qty;
        if (r.month) o.months26.add(r.month);
      }
      const b = r.brand || 'OTHER';
      o.brands[y][b] = (o.brands[y][b] || 0) + amt;
      if (Array.isArray(r.seg_items)) {
        for (const it of r.seg_items) {
          const key = matchSegFocus(it.segment);
          if (!key) continue;
          const sg = o.segs[key];
          if (y === '2025') { sg.a25 += Number(it.amt) || 0; sg.q25 += Number(it.qty) || 0; }
          else { sg.a26 += Number(it.amt) || 0; sg.q26 += Number(it.qty) || 0; }
        }
      }
    }

    // Isi SKU detail hanya untuk subset (fokus / top / peer kota) agar render cepat
    const fillSkusFor = (nameSet) => {
      if (!nameSet || !nameSet.size) return;
      for (const r of dealersAll) {
        const name = r.dealer || r.soldto;
        if (!name || !nameSet.has(name)) continue;
        const y = String(r.year || '');
        if (!years.includes(y)) continue;
        const o = dealerAgg.get(name);
        if (!o || !Array.isArray(r.sku_items)) continue;
        for (const it of r.sku_items) {
          const sk = it.sku || it.unit || 'Unknown';
          if (!o.skus.has(sk)) o.skus.set(sk, { a25: 0, a26: 0, q25: 0, q26: 0 });
          const s = o.skus.get(sk);
          if (y === '2025') { s.a25 += Number(it.amt) || 0; s.q25 += Number(it.qty) || 0; }
          else { s.a26 += Number(it.amt) || 0; s.q26 += Number(it.qty) || 0; }
        }
        o._skuReady = true;
      }
    };

    // Market kota dari semua dealer (filter brand/depo)
    const cityYearAmt = { '2025': new Map(), '2026': new Map() };
    const cityDealerList = new Map(); // city -> Set of dealer names
    for (const o of dealerAgg.values()) {
      const city = (o.city || '').trim() || 'Unknown';
      if (city === 'Unknown') continue;
      cityYearAmt['2025'].set(city, (cityYearAmt['2025'].get(city) || 0) + o.a25);
      cityYearAmt['2026'].set(city, (cityYearAmt['2026'].get(city) || 0) + o.a26);
      if (!cityDealerList.has(city)) cityDealerList.set(city, new Set());
      cityDealerList.get(city).add(o.name);
    }

    // Focus set
    const focusNames = hasDealerFilter
      ? dealerFilter.filter(n => dealerAgg.has(n))
      : [...dealerAgg.keys()]
          .map(n => dealerAgg.get(n))
          .sort((a, b) => (b.a25 + b.a26) - (a.a25 + a.a26))
          .slice(0, 1)
          .map(o => o.name); // default: dealer terbesar (review tajam); multi = filter dealer
    // Jika user tidak pilih dealer: pakai top 1 untuk scorecard SKU; agregat amount tetap bisa di-expand
    const focusNamesForAgg = hasDealerFilter
      ? focusNames
      : [...dealerAgg.keys()]; // amount scorecard = semua; SKU detail = top + peer
    const focusList = focusNamesForAgg.map(n => dealerAgg.get(n)).filter(Boolean);

    // Tentukan kota dominan dulu (untuk peer + SKU)
    let preCity = '';
    if (hasDealerFilter && focusList.length === 1) preCity = focusList[0].city || '';
    else {
      const cityAmtTmp = new Map();
      for (const o of focusList) {
        const c = (o.city || '').trim();
        if (!c) continue;
        cityAmtTmp.set(c, (cityAmtTmp.get(c) || 0) + o.a25 + o.a26);
      }
      if (cityAmtTmp.size) {
        preCity = [...cityAmtTmp.entries()].sort((a, b) => b[1] - a[1])[0][0];
      }
    }
    const peerNamesPre = preCity
      ? [...(cityDealerList.get(preCity) || [])]
      : [];
    const topNamesPre = [...dealerAgg.values()]
      .sort((a, b) => b.a26 - a.a26)
      .slice(0, 15)
      .map(o => o.name);
    const skuNameSet = new Set([
      ...(hasDealerFilter ? focusNames : topNamesPre.slice(0, 1)),
      ...peerNamesPre,
      ...topNamesPre,
    ]);
    fillSkusFor(skuNameSet);

    // Aggregate focus
    const sumFocus = () => {
      const out = {
        name: hasDealerFilter
          ? (focusList.length === 1 ? focusList[0].name : focusList.length + ' dealer terfilter')
          : 'Semua dealer (filter brand/DEPO)',
        city: focusList.length === 1 ? (focusList[0].city || '') : '',
        a25: 0, a26: 0, q25: 0, q26: 0,
        months25: new Set(), months26: new Set(),
        skus: new Map(),
        segs: Object.fromEntries(SEG_FOCUS.map(s => [s, { a25: 0, a26: 0, q25: 0, q26: 0 }])),
        brands: { '2025': {}, '2026': {} },
        cities: new Map(), // city -> {a25,a26}
      };
      for (const o of focusList) {
        out.a25 += o.a25; out.a26 += o.a26;
        out.q25 += o.q25; out.q26 += o.q26;
        o.months25.forEach(m => out.months25.add(m));
        o.months26.forEach(m => out.months26.add(m));
        const c = (o.city || '').trim() || 'Unknown';
        if (!out.cities.has(c)) out.cities.set(c, { a25: 0, a26: 0 });
        const co = out.cities.get(c);
        co.a25 += o.a25; co.a26 += o.a26;
        for (const [sk, v] of o.skus) {
          if (!out.skus.has(sk)) out.skus.set(sk, { a25: 0, a26: 0, q25: 0, q26: 0 });
          const s = out.skus.get(sk);
          s.a25 += v.a25; s.a26 += v.a26; s.q25 += v.q25; s.q26 += v.q26;
        }
        for (const s of SEG_FOCUS) {
          out.segs[s].a25 += o.segs[s].a25; out.segs[s].a26 += o.segs[s].a26;
          out.segs[s].q25 += o.segs[s].q25; out.segs[s].q26 += o.segs[s].q26;
        }
        for (const y of years) {
          for (const [b, amt] of Object.entries(o.brands[y] || {})) {
            out.brands[y][b] = (out.brands[y][b] || 0) + amt;
          }
        }
      }
      // dominant city
      if (!out.city && out.cities.size) {
        out.city = [...out.cities.entries()].sort((a, b) => (b[1].a25 + b[1].a26) - (a[1].a25 + a[1].a26))[0][0];
      }
      return out;
    };
    const focus = sumFocus();
    const singleDealer = hasDealerFilter && focusList.length === 1 ? focusList[0] : null;

    // Rank di kota (by a26)
    const cityOfFocus = (focus.city || '').trim() || 'Unknown';
    const peersInCity = cityOfFocus !== 'Unknown'
      ? [...(cityDealerList.get(cityOfFocus) || [])].map(n => dealerAgg.get(n)).filter(Boolean)
      : [];
    const peersRanked = peersInCity.slice().sort((a, b) => b.a26 - a.a26);
    const rankInCity = singleDealer
      ? (peersRanked.findIndex(p => p.name === singleDealer.name) + 1) || '—'
      : '—';
    const cityTot25 = cityYearAmt['2025'].get(cityOfFocus) || 0;
    const cityTot26 = cityYearAmt['2026'].get(cityOfFocus) || 0;
    const focusCityAmt25 = focus.cities.get(cityOfFocus)?.a25 || (cityOfFocus === focus.city ? focus.a25 : 0);
    const focusCityAmt26 = focus.cities.get(cityOfFocus)?.a26 || (cityOfFocus === focus.city ? focus.a26 : 0);
    // If multi-city focus, use sum in dominant city from cities map
    const fCity25 = focus.cities.get(cityOfFocus)?.a25 || 0;
    const fCity26 = focus.cities.get(cityOfFocus)?.a26 || 0;
    const shareCity25 = cityTot25 ? fCity25 / cityTot25 : 0;
    const shareCity26 = cityTot26 ? fCity26 / cityTot26 : 0;

    // Peer averages (same city)
    const peerAvg = (() => {
      if (!peersInCity.length) return null;
      const n = peersInCity.length;
      const avgA26 = peersInCity.reduce((a, p) => a + p.a26, 0) / n;
      const avgA25 = peersInCity.reduce((a, p) => a + p.a25, 0) / n;
      const avgSku = peersInCity.reduce((a, p) => a + p.skus.size, 0) / n;
      const avgMonths = peersInCity.reduce((a, p) => a + p.months26.size, 0) / n;
      const avgShare = cityTot26
        ? peersInCity.reduce((a, p) => a + (p.a26 / cityTot26), 0) / n
        : 0;
      const avgPremHigh = peersInCity.reduce((a, p) => {
        const tot = p.a26 || 1;
        const ph = (p.segs.PREMIUM?.a26 || 0) + (p.segs.HIGH?.a26 || 0);
        return a + ph / tot;
      }, 0) / n;
      const top3 = peersRanked.slice(0, 3);
      return { n, avgA26, avgA25, avgSku, avgMonths, avgShare, avgPremHigh, top3 };
    })();

    // YoY
    const yoy = focus.a25 ? (focus.a26 - focus.a25) / focus.a25 : (focus.a26 > 0 ? 1 : 0);
    const yoyAbs = focus.a26 - focus.a25;
    const statusBadge = yoy > 0.05 ? 'up' : (yoy < -0.05 ? 'down' : 'flat');
    const statusLabel = statusBadge === 'up' ? 'NAIK' : (statusBadge === 'down' ? 'TURUN' : 'STABIL');

    // SKU counts
    const skuActive26 = [...focus.skus.values()].filter(s => s.a26 > 0 || s.q26 > 0).length;
    const skuActive25 = [...focus.skus.values()].filter(s => s.a25 > 0 || s.q25 > 0).length;

    // Segment totals for focus
    const segAmt = {
      '2025': Object.fromEntries(SEG_FOCUS.map(s => [s, focus.segs[s].a25])),
      '2026': Object.fromEntries(SEG_FOCUS.map(s => [s, focus.segs[s].a26])),
    };
    const segQty = {
      '2025': Object.fromEntries(SEG_FOCUS.map(s => [s, focus.segs[s].q25])),
      '2026': Object.fromEntries(SEG_FOCUS.map(s => [s, focus.segs[s].q26])),
    };
    const segs = SEG_FOCUS.slice();
    const segAmtTot = Object.fromEntries(years.map(y => [y, segs.reduce((a, s) => a + (segAmt[y][s] || 0), 0)]));
    const segQtyTot = Object.fromEntries(years.map(y => [y, segs.reduce((a, s) => a + (segQty[y][s] || 0), 0)]));
    const segAmtPct = Object.fromEntries(years.map(y => [
      y, Object.fromEntries(segs.map(s => [s, segAmtTot[y] ? (segAmt[y][s] || 0) / segAmtTot[y] : 0])),
    ]));
    const segQtyPct = Object.fromEntries(years.map(y => [
      y, Object.fromEntries(segs.map(s => [s, segQtyTot[y] ? (segQty[y][s] || 0) / segQtyTot[y] : 0])),
    ]));

    // City segment mix (peers in same city) for under/over
    const citySegAmt = Object.fromEntries(SEG_FOCUS.map(s => [s, 0]));
    for (const p of peersInCity) {
      for (const s of SEG_FOCUS) citySegAmt[s] += p.segs[s].a26 || 0;
    }
    const citySegTot = Object.values(citySegAmt).reduce((a, v) => a + v, 0) || 1;
    const citySegPct = Object.fromEntries(SEG_FOCUS.map(s => [s, citySegAmt[s] / citySegTot]));

    // ASP
    const aspRows = SEG_FOCUS.map(s => {
      const a25 = segAmt['2025'][s] || 0, q25 = segQty['2025'][s] || 0;
      const a26 = segAmt['2026'][s] || 0, q26 = segQty['2026'][s] || 0;
      return {
        s,
        asp25: q25 ? a25 / q25 : 0,
        asp26: q26 ? a26 / q26 : 0,
        q25, q26, a25, a26,
      };
    }).filter(r => r.a25 + r.a26 > 0);

    // Brand share (from grain — consistent with chart 1)
    const brandYearAmt = {
      '2025': Object.fromEntries(BRANDS.map(b => [b, 0])),
      '2026': Object.fromEntries(BRANDS.map(b => [b, 0])),
    };
    for (const r of grain) {
      const y = String(r.year || '');
      const b = r.brand;
      if (!brandYearAmt[y] || !b) continue;
      brandYearAmt[y][b] = (brandYearAmt[y][b] || 0) + (Number(r.amt) || 0);
    }
    const brandTot = Object.fromEntries(years.map(y => [
      y, BRANDS.reduce((a, b) => a + (brandYearAmt[y][b] || 0), 0),
    ]));
    const brandShare = Object.fromEntries(years.map(y => [
      y, Object.fromEntries(BRANDS.map(b => [b, brandTot[y] ? (brandYearAmt[y][b] || 0) / brandTot[y] : 0])),
    ]));

    // City compare rows (chart 2)
    const byCityFocus = new Map();
    if (hasDealerFilter) {
      for (const o of focusList) {
        const city = (o.city || '').trim() || 'Unknown';
        if (city === 'Unknown') continue;
        if (!byCityFocus.has(city)) byCityFocus.set(city, { city, name: o.name, a25: 0, a26: 0, dealers: new Set() });
        const x = byCityFocus.get(city);
        x.a25 += o.a25; x.a26 += o.a26;
        x.dealers.add(o.name);
      }
      for (const x of byCityFocus.values()) {
        const names = [...x.dealers];
        x.name = names.length === 1 ? names[0] : names.length + ' dealer';
      }
    } else {
      // top dealers individual
      const topD = [...dealerAgg.values()].sort((a, b) => (b.a25 + b.a26) - (a.a25 + a.a26)).slice(0, 12);
      for (const o of topD) {
        const city = (o.city || '').trim() || 'Unknown';
        byCityFocus.set(o.name + '||' + city, { city, name: o.name, a25: o.a25, a26: o.a26 });
      }
    }
    const cityCompare = [...byCityFocus.values()]
      .map((o) => {
        const city = o.city;
        const ct25 = cityYearAmt['2025'].get(city) || 0;
        const ct26 = cityYearAmt['2026'].get(city) || 0;
        return {
          label: hasDealerFilter ? city : ((o.name || '') + ' · ' + city),
          city, name: o.name || '',
          a25: o.a25, a26: o.a26,
          cityTot25: ct25, cityTot26: ct26,
          c25: ct25 ? o.a25 / ct25 : 0,
          c26: ct26 ? o.a26 / ct26 : 0,
          total: o.a25 + o.a26,
        };
      })
      .filter(r => r.total > 0)
      .sort((a, b) => b.total - a.total)
      .slice(0, 12);

    // Monthly revenue focus
    const revMonthYear = {
      '2025': Object.fromEntries(monthsOrd.map(m => [m, 0])),
      '2026': Object.fromEntries(monthsOrd.map(m => [m, 0])),
    };
    for (const r of dealersF) {
      const y = String(r.year || '');
      const m = r.month;
      if (!revMonthYear[y] || revMonthYear[y][m] === undefined) continue;
      revMonthYear[y][m] += Number(r.amt) || 0;
    }
    const monthsWithData = monthsOrd.filter(m =>
      (revMonthYear['2025'][m] || 0) + (revMonthYear['2026'][m] || 0) > 0
    );

    // Regularity: empty months & consecutive drops
    const months26Active = monthsOrd.filter(m => (revMonthYear['2026'][m] || 0) > 0);
    const emptyMonths26 = monthsOrd.filter(m => {
      // only months that have market activity in year meta - use months with any data in dealersAll 2026
      return false; // filled below
    });
    // months that exist in year 2026 data globally for filter
    const globalMonths26 = new Set();
    for (const r of dealersAll) {
      if (String(r.year) === '2026' && r.month) globalMonths26.add(r.month);
    }
    const missingMonths26 = monthsOrd.filter(m => globalMonths26.has(m) && !(revMonthYear['2026'][m] > 0));
    let consecDrop = 0, maxConsecDrop = 0;
    let prev = null;
    for (const m of monthsOrd) {
      const v = revMonthYear['2026'][m] || 0;
      if (!globalMonths26.has(m)) continue;
      if (prev != null && prev > 0 && v < prev * 0.8) {
        consecDrop++;
        maxConsecDrop = Math.max(maxConsecDrop, consecDrop);
      } else {
        consecDrop = 0;
      }
      if (v > 0) prev = v;
    }

    // Top 3 SKU concentration (untuk flag gap saja)
    const topSkuSorted = [...focus.skus.entries()]
      .map(([sku, v]) => ({ sku, a26: v.a26 || 0 }))
      .sort((a, b) => b.a26 - a.a26);
    const top3Share = focus.a26
      ? topSkuSorted.slice(0, 3).reduce((a, s) => a + s.a26, 0) / focus.a26
      : 0;

    // Brand concentration focus 2026
    const brandFocus26 = focus.brands['2026'] || {};
    const brandFocusTot26 = Object.values(brandFocus26).reduce((a, v) => a + v, 0) || 1;
    const brandFocusShare = BRANDS.map(b => ({ b, p: (brandFocus26[b] || 0) / brandFocusTot26 }))
      .sort((a, b) => b.p - a.p);
    const topBrandP = brandFocusShare[0]?.p || 0;

    // Premium+High mix
    const premHigh26 = ((focus.segs.PREMIUM.a26 || 0) + (focus.segs.HIGH.a26 || 0)) / (focus.a26 || 1);
    const premHigh25 = ((focus.segs.PREMIUM.a25 || 0) + (focus.segs.HIGH.a25 || 0)) / (focus.a25 || 1);

    // ——— Gap flags ———
    const flags = [];
    if (focus.a25 > 0 && yoy < -0.1) {
      flags.push({
        lv: 'bad',
        title: 'Growth negatif',
        body: `Revenue 2026 ${fmtIDR(focus.a26)} — turun ${fmtPct(Math.abs(yoy))} vs 2025 (${fmtIDR(focus.a25)}).`,
        act: 'Cek bulan drop, alokasi stok, dan program kompetitor di kota.',
      });
    } else if (focus.a25 > 0 && yoy > 0.1) {
      flags.push({
        lv: 'ok',
        title: 'Growth positif',
        body: `Revenue naik ${fmtPct(yoy)} YoY (+${fmtIDR(yoyAbs)}).`,
        act: 'Jaga momentum: pastikan mix Premium/High tidak turun.',
      });
    }
    if (cityTot26 > 0 && shareCity26 + 0.001 < shareCity25 - 0.02) {
      flags.push({
        lv: 'bad',
        title: 'Share kota turun',
        body: `Kontribusi di ${cityOfFocus}: ${fmtPct(shareCity25)} → ${fmtPct(shareCity26)}.`,
        act: 'Market kota tumbuh lebih cepat dari dealer — kejar coverage & order rutin.',
      });
    } else if (cityTot26 > 0 && shareCity26 > shareCity25 + 0.02) {
      flags.push({
        lv: 'ok',
        title: 'Share kota menguat',
        body: `Kontribusi di ${cityOfFocus}: ${fmtPct(shareCity25)} → ${fmtPct(shareCity26)}.`,
        act: 'Pertahankan rank; amankan SKU hero kota.',
      });
    }
    if (focus.a26 > 0 && premHigh26 < 0.15 && (peerAvg ? premHigh26 < peerAvg.avgPremHigh - 0.03 : true)) {
      flags.push({
        lv: 'warn',
        title: 'Mix Premium+High lemah',
        body: `Premium+High hanya ${fmtPct(premHigh26)} dari value 2026${peerAvg ? ` (peer kota ${fmtPct(peerAvg.avgPremHigh)})` : ''}.`,
        act: 'Push demo unit, bundle, dan alokasi model High/Premium.',
      });
    }
    if (peerAvg && skuActive26 < peerAvg.avgSku * 0.6 && peerAvg.avgSku >= 5) {
      flags.push({
        lv: 'warn',
        title: 'SKU sempit vs peer',
        body: `SKU aktif 2026: ${skuActive26} · rata-rata peer kota: ${peerAvg.avgSku.toFixed(0)}.`,
        act: 'Listing model key yang laku di kota (lihat Opportunity SKU).',
      });
    }
    if (missingMonths26.length >= 2) {
      flags.push({
        lv: 'bad',
        title: 'Order tidak rutin',
        body: `${missingMonths26.length} bulan tanpa penjualan di 2026 (saat market kota aktif): ${missingMonths26.slice(0, 6).join(', ')}.`,
        act: 'Susun rencana order bulanan + follow-up sales.',
      });
    }
    if (topBrandP > 0.8) {
      flags.push({
        lv: 'warn',
        title: 'Ketergantungan 1 brand',
        body: `${brandFocusShare[0].b} menguasai ${fmtPct(topBrandP)} value dealer 2026.`,
        act: 'Balance multi-brand sesuai program DEPO — kurangi risiko 1 merek.',
      });
    }
    if (top3Share > 0.6 && focus.a26 > 0) {
      flags.push({
        lv: 'warn',
        title: 'Revenue tergantung top 3 SKU',
        body: `Top 3 model = ${fmtPct(top3Share)} revenue 2026.`,
        act: 'Diversifikasi model sekelas agar tidak fragile.',
      });
    }
    if (focus.q26 > 0 && focus.q25 > 0) {
      const aspAll25 = focus.a25 / focus.q25;
      const aspAll26 = focus.a26 / focus.q26;
      if (focus.q26 > focus.q25 * 1.05 && aspAll26 < aspAll25 * 0.9) {
        flags.push({
          lv: 'warn',
          title: 'Qty naik, ASP turun',
          body: `Qty +${fmtPct((focus.q26 - focus.q25) / focus.q25)} tapi ASP ${fmtIDR(aspAll25)} → ${fmtIDR(aspAll26)}.`,
          act: 'Perbaiki mix — kurangi over-index Entry/ULC jika margin tertekan.',
        });
      }
    }
    if (peerAvg && singleDealer && focus.a26 < peerAvg.avgA26 * 0.5) {
      flags.push({
        lv: 'bad',
        title: 'Di bawah peer kota',
        body: `Rev 2026 ${fmtIDR(focus.a26)} vs rata-rata peer ${fmtIDR(peerAvg.avgA26)} (${peerAvg.n} dealer di ${cityOfFocus}).`,
        act: 'Pelajari top 3 peer: SKU & frekuensi order mereka.',
      });
    }
    // sort: bad, warn, ok — max 8
    const lvOrder = { bad: 0, warn: 1, ok: 2 };
    flags.sort((a, b) => lvOrder[a.lv] - lvOrder[b.lv]);
    const flagsShow = flags.slice(0, 8);
    if (!flagsShow.length) {
      flagsShow.push({
        lv: 'ok',
        title: 'Tidak ada flag kritis',
        body: 'Belum terdeteksi pola merah/kuning dari rule otomatis. Tetap cek share kota & mix segmen.',
        act: 'Pilih 1 dealer spesifik untuk review lebih tajam.',
      });
    }

    // Insights short
    const shareInsight = () => {
      const ranked = BRANDS.slice().sort((a, b) => (brandShare['2026'][b] || 0) - (brandShare['2026'][a] || 0));
      const top = ranked[0];
      return `<strong>Artinya:</strong> porsi value (No Tax) tiap brand di filter aktif.<br>
        Teratas 2026: <strong>${top}</strong> (${fmtPct(brandShare['2026'][top] || 0)}).<br>
        ${ranked.map(b => `• ${b}: ${fmtPct(brandShare['2025'][b] || 0)} → ${fmtPct(brandShare['2026'][b] || 0)}`).join('<br>')}`;
    };
    const cityContribInsight = () => {
      if (!cityCompare.length) return 'Belum ada data kontribusi kota.';
      const t = cityCompare[0];
      return `<strong>Artinya:</strong> di kota yang sama, berapa % market kota diisi dealer yang direview.<br>
        Rumus: <code>Rev dealer ÷ Total market kota</code> (brand/DEPO sama).<br>
        Contoh: <strong>${esc(t.label)}</strong> — ${fmtPct(t.c26)} di 2026 (rev ${fmtIDR(t.a26)} dari market ${fmtIDR(t.cityTot26)}).`;
    };
    const revInsight = () => {
      const t25 = monthsWithData.reduce((a, m) => a + (revMonthYear['2025'][m] || 0), 0);
      const t26 = monthsWithData.reduce((a, m) => a + (revMonthYear['2026'][m] || 0), 0);
      return `<strong>Artinya:</strong> revenue bulanan dealer terfilter.<br>
        Total 2025 <strong>${fmtIDR(t25)}</strong> · 2026 <strong>${fmtIDR(t26)}</strong>.<br>
        Bulan aktif 2026: <strong>${months26Active.length}</strong>${missingMonths26.length ? ` · kosong: ${missingMonths26.join(', ')}` : ''}.`;
    };
    const segInsightAmt = () => {
      const top = segs.slice().sort((a, b) => (segAmtPct['2026'][b] || 0) - (segAmtPct['2026'][a] || 0))[0];
      return `<strong>Artinya:</strong> bauran value 8 segmen (%). Hover batang untuk nilai Rp.<br>
        Terbesar 2026: <strong>${top}</strong> (${fmtPct(segAmtPct['2026'][top] || 0)}). Premium+High: ${fmtPct(premHigh26)}.`;
    };
    const segInsightQty = () => {
      const top = segs.slice().sort((a, b) => (segQtyPct['2026'][b] || 0) - (segQtyPct['2026'][a] || 0))[0];
      return `<strong>Artinya:</strong> bauran unit 8 segmen (%). Hover untuk qty absolut.<br>
        Qty terbesar 2026: <strong>${top}</strong> (${fmtPct(segQtyPct['2026'][top] || 0)}).`;
    };

    const filterHint = [
      !isAll(state.year) ? 'Thn ' + fmtMulti(state.year, '', 2) : '2025+2026',
      !isAll(revDealerBrandFilter)
        ? 'Brand ' + fmtMulti(revDealerBrandFilter, '', 3)
        : (!isAll(state.brand) ? 'Brand ' + fmtMulti(state.brand, '', 3) : 'All brand'),
      !isAll(state.depo) ? fmtMulti(state.depo, '', 2) : 'All DEPO',
      hasDealerFilter ? fmtMulti(dealerFilter, '', 2) : 'All dealer',
    ].join(' · ');

    // ——— Klasifikasi dealer by value PER BULAN · Nett Amount WITH TAX ———
    const VC_DEFS = [
      { id: 0, label: '0 – 5.000.000', short: '0–5 JT' },
      { id: 1, label: '5.000.001 – 10.000.000', short: '5–10 JT' },
      { id: 2, label: '10.000.001 – 15.000.000', short: '10–15 JT' },
      { id: 3, label: '15.000.001 – 20.000.000', short: '15–20 JT' },
      { id: 4, label: '> 20.000.001', short: '>20 JT' },
    ];
    const VC_COLORS = ['#94a3b8', '#38bdf8', '#0ea5e9', '#2563eb', '#0B2F6B'];
    const valueClassOf = (amt) => {
      const a = Number(amt) || 0;
      if (a <= 5000000) return 0;
      if (a <= 10000000) return 1;
      if (a <= 15000000) return 2;
      if (a <= 20000000) return 3;
      return 4;
    };

    // Agregat value WITH TAX per dealer × tahun × bulan
    // Catatan: sengaja TIDAK filter bulan slicer di sini agar MoM (Mei vs Jun) tetap bisa
    // saat user hanya memilih 1 bulan di slicer. Brand/DEPO/tahun/dealer tetap difilter.
    const passRDNoMonth = (r) => {
      if (r.depo === 'Unknown') return false;
      if (!matchMulti(state.brand, r.brand)) return false;
      if (!matchMulti(revDealerBrandFilter, r.brand)) return false;
      if (!matchMulti(state.depo, r.depo)) return false;
      if (!matchMulti(state.quartal, r.quartal)) return false;
      if (!matchMulti(state.week, r.week)) return false;
      if (!matchMulti(state.year, r.year)) return false;
      return true;
    };
    let vcSrc = (DATA.dealer_grain || []).filter(passRDNoMonth);
    if (hasDealerFilter) {
      vcSrc = vcSrc.filter(r => matchMulti(dealerFilter, r.dealer || r.soldto));
    }
    const dealerMonthMap = new Map(); // key: year|month|name
    for (const r of vcSrc) {
      const name = r.dealer || r.soldto;
      if (!name) continue;
      const y = String(r.year || '');
      const m = r.month;
      if (!years.includes(y) || !m) continue;
      const k = y + '|' + m + '|' + name;
      if (!dealerMonthMap.has(k)) {
        dealerMonthMap.set(k, {
          name,
          city: '',
          year: y,
          month: m,
          amt: 0,       // Nett Amount WITH TAX (klasifikasi)
          amtNet: 0,    // No Tax — hanya untuk rasio mix segment
          qty: 0,
          brands: Object.fromEntries(BRANDS.map(b => [b, 0])),
          premHigh: 0,
        });
      }
      const o = dealerMonthMap.get(k);
      const amtNet = Number(r.amt) || 0;
      // Khusus klasifikasi dealer value: Nett Amount WITH TAX
      const useTax = Number.isFinite(Number(r.amt_tax)) ? Number(r.amt_tax) : amtNet;
      const qty = Number(r.qty) || 0;
      o.amt += useTax;
      o.amtNet += amtNet;
      o.qty += qty;
      if (r.city) o.city = r.city;
      const b = r.brand || 'OTHER';
      if (o.brands[b] !== undefined) o.brands[b] += useTax;
      if (Array.isArray(r.seg_items)) {
        for (const it of r.seg_items) {
          const sg = matchSegFocus(it.segment);
          if (sg === 'PREMIUM' || sg === 'HIGH') o.premHigh += Number(it.amt) || 0;
        }
      }
    }

    // Index: year -> month -> Map(name -> record)
    const byYM = { '2025': new Map(), '2026': new Map() };
    for (const o of dealerMonthMap.values()) {
      if (o.amt <= 0) continue;
      o.cls = valueClassOf(o.amt); // bucket dari WITH TAX
      o.ph = o.amtNet ? o.premHigh / o.amtNet : 0; // mix % dari no-tax (struktur segmen)
      o.asp = o.qty ? o.amt / o.qty : 0; // ASP with tax
      let topB = '—', topV = -1;
      for (const [bn, bv] of Object.entries(o.brands)) {
        if (bv > topV) { topV = bv; topB = bn; }
      }
      o.topBrand = topB;
      o.topShare = o.amt ? topV / o.amt : 0;
      if (!byYM[o.year]) byYM[o.year] = new Map();
      if (!byYM[o.year].has(o.month)) byYM[o.year].set(o.month, new Map());
      byYM[o.year].get(o.month).set(o.name, o);
    }

    // Semua bulan yang punya data (tanpa batasi filter — dipakai cari bulan prev MoM)
    const vcMonthsAll = monthsOrd.filter(m =>
      (byYM['2025']?.get(m)?.size || 0) + (byYM['2026']?.get(m)?.size || 0) > 0
    );

    // Hormati filter Bulan slicer untuk matrix / tren / fokus
    const monthFilter = asArr(state.month);
    const isMonthFiltered = !isAll(monthFilter);
    // Bulan yang ditampilkan: ikut filter slicer (urutan kalender). MoM prev diambil dari luar set ini.
    const vcMonthsView = isMonthFiltered
      ? monthsOrd.filter(m => matchMulti(monthFilter, m))
      : vcMonthsAll.slice();

    const classCounts = (year, month) => {
      const map = byYM[year]?.get(month);
      const c = VC_DEFS.map(d => ({ id: d.id, label: d.label, short: d.short, n: 0, rev: 0, q: 0 }));
      let total = 0, rev = 0, qty = 0;
      if (map) {
        for (const o of map.values()) {
          c[o.cls].n += 1;
          c[o.cls].rev += o.amt;
          c[o.cls].q += o.qty;
          total += 1;
          rev += o.amt;
          qty += o.qty;
        }
      }
      return { c, total, rev, qty, map: map || new Map() };
    };

    // Snapshot per bulan — HANYA bulan yang lolos filter slicer
    const vcMonthRows = vcMonthsView.map(m => {
      const s25 = classCounts('2025', m);
      const s26 = classCounts('2026', m);
      return { month: m, s25, s26 };
    });

    // Bulan fokus: 1 bulan di slicer → pakai itu; multi → terakhir di set terfilter; kosong → terakhir overall
    let vcFocusMonth = '';
    if (monthFilter.length === 1) {
      vcFocusMonth = String(monthFilter[0]);
    } else if (vcMonthsView.length) {
      const m26 = [...vcMonthsView].reverse().find(m => (byYM['2026']?.get(m)?.size || 0) > 0);
      vcFocusMonth = m26 || vcMonthsView[vcMonthsView.length - 1];
    } else if (vcMonthsAll.length) {
      const m26 = [...vcMonthsAll].reverse().find(m => (byYM['2026']?.get(m)?.size || 0) > 0);
      vcFocusMonth = m26 || vcMonthsAll[vcMonthsAll.length - 1];
    }
    const focus25 = vcFocusMonth ? classCounts('2025', vcFocusMonth) : { c: VC_DEFS.map(() => ({ n: 0, rev: 0 })), total: 0, rev: 0, qty: 0, map: new Map() };
    const focus26 = vcFocusMonth ? classCounts('2026', vcFocusMonth) : { c: VC_DEFS.map(() => ({ n: 0, rev: 0 })), total: 0, rev: 0, qty: 0, map: new Map() };

    // Tahun fokus untuk grafik MoM (tahun yang sama, bukan antar tahun)
    const yearFilterArr = asArr(state.year);
    let vcFocusYear = '2026';
    if (yearFilterArr.length === 1 && years.includes(String(yearFilterArr[0]))) {
      vcFocusYear = String(yearFilterArr[0]);
    } else if (vcFocusMonth && (byYM['2026']?.get(vcFocusMonth)?.size || 0) > 0) {
      vcFocusYear = '2026';
    } else if (vcFocusMonth && (byYM['2025']?.get(vcFocusMonth)?.size || 0) > 0) {
      vcFocusYear = '2025';
    }
    // Bulan sebelumnya di tahun yang sama (cari di kalender penuh, bukan hanya set terfilter)
    // agar filter "Jun" tetap bisa bandingkan "Mei" untuk diagram MoM
    let vcMomPrevMonth = '';
    if (vcFocusMonth) {
      const idxF = monthsOrd.indexOf(vcFocusMonth);
      for (let i = idxF - 1; i >= 0; i--) {
        const mPrev = monthsOrd[i];
        if ((byYM[vcFocusYear]?.get(mPrev)?.size || 0) > 0) {
          vcMomPrevMonth = mPrev;
          break;
        }
      }
    }
    const emptyVcPack = { c: VC_DEFS.map(d => ({ id: d.id, label: d.label, short: d.short, n: 0, rev: 0, q: 0 })), total: 0, rev: 0, qty: 0, map: new Map() };
    const focusCurY = vcFocusMonth ? classCounts(vcFocusYear, vcFocusMonth) : emptyVcPack;
    const focusPrevY = vcMomPrevMonth ? classCounts(vcFocusYear, vcMomPrevMonth) : emptyVcPack;

    // Rincian naik/turun kelas = MoM di tahun fokus (sesuai filter bulan yang dilihat)
    // Contoh filter Jun 2026 → bandingkan Mei 2026 vs Jun 2026 — hanya 2 tabel
    const momPrevMonth = vcMomPrevMonth || '';
    let momUp = 0, momDown = 0, momStay = 0;
    const momDownList = [];
    const momUpList = [];
    if (vcFocusMonth && momPrevMonth) {
      const prev = classCounts(vcFocusYear, momPrevMonth);
      const cur = focusCurY;
      const names = new Set([...prev.map.keys(), ...cur.map.keys()]);
      for (const name of names) {
        const a = prev.map.get(name);
        const b = cur.map.get(name);
        if (!a || !b) continue;
        const rec = {
          name, city: b.city || a.city,
          a25: a.amt, a26: b.amt, // prev vs cur (reuse field names)
          q25: a.qty, q26: b.qty,
          c25: a.cls, c26: b.cls,
          yoy: a.amt ? (b.amt - a.amt) / a.amt : 0,
          dAbs: b.amt - a.amt,
          asp25: a.asp, asp26: b.asp,
          ph25: a.ph, ph26: b.ph,
          topName25: a.topBrand, topName26: b.topBrand,
          brands25: a.brands, brands26: b.brands,
        };
        if (b.cls > a.cls) { momUp++; momUpList.push(rec); }
        else if (b.cls < a.cls) { momDown++; momDownList.push(rec); }
        else momStay++;
      }
      momUpList.sort((a, b) => b.dAbs - a.dAbs);
      momDownList.sort((a, b) => a.dAbs - b.dAbs);
    }

    // Highlight single dealer: kelas per bulan (2026) + YoY bulan fokus
    let focusClassNote = '';
    if (singleDealer && vcFocusMonth) {
      const a = focus25.map.get(singleDealer.name);
      const b = focus26.map.get(singleDealer.name);
      const lab25 = a ? VC_DEFS[a.cls].label : 'Tidak transaksi';
      const lab26 = b ? VC_DEFS[b.cls].label : 'Tidak transaksi';
      let move = 'STABIL di kelas yang sama';
      if (!a && b) move = 'BARU di bulan ini vs tahun lalu';
      else if (a && !b) move = 'HILANG transaksi di bulan ini vs tahun lalu';
      else if (a && b && b.cls > a.cls) move = 'NAIK kelas value (YoY bulan sama)';
      else if (a && b && b.cls < a.cls) move = 'TURUN kelas value (YoY bulan sama)';
      // mini trail 2026 months
      const trail = vcMonthsView.map(m => {
        const o = byYM['2026']?.get(m)?.get(singleDealer.name);
        return o ? `${m}:${VC_DEFS[o.cls].short}` : null;
      }).filter(Boolean).slice(-6).join(' · ');
      focusClassNote = `Dealer fokus <strong>${esc(singleDealer.name)}</strong> · ${vcFocusMonth}: 2025 <strong>${lab25}</strong> → 2026 <strong>${lab26}</strong> · ${move}.${trail ? `<br>Trail kelas 2026: ${trail}` : ''}`;
    }

    // Cards = kelas di bulan fokus (bukan full year)
    const vcCardHtml = VC_DEFS.map((d, i) => {
      const n25 = focus25.c[i]?.n || 0;
      const n26 = focus26.c[i]?.n || 0;
      const r25 = focus25.c[i]?.rev || 0;
      const r26 = focus26.c[i]?.rev || 0;
      const dn = n26 - n25;
      const dr = r26 - r25;
      const dCls = dn > 0 ? 'pos' : (dn < 0 ? 'neg' : '');
      const rCls = dr > 0 ? 'pos' : (dr < 0 ? 'neg' : '');
      return `<div class="rd-vc-card">
        <div class="lab">${esc(d.label)}</div>
        <div class="n">${n26} <span style="font-size:.72rem;color:#94a3b8;font-weight:800">dlr · ${esc(vcFocusMonth || '—')} 26</span></div>
        <div class="meta">${esc(vcFocusMonth || '—')} 25: ${n25} · <span class="delta ${dCls}">${dn >= 0 ? '+' : ''}${dn}</span></div>
        <div class="meta">With tax 26: ${fmtIDR(r26)}</div>
        <div class="meta">vs 25: <span class="delta ${rCls}">${dr >= 0 ? '+' : ''}${fmtIDR(dr)}</span></div>
      </div>`;
    }).join('');

    const maxVcN = Math.max(1, ...VC_DEFS.map((_, i) => Math.max(focus25.c[i]?.n || 0, focus26.c[i]?.n || 0)));
    const vcBarHtml = VC_DEFS.map((d, i) => {
      const n25 = focus25.c[i]?.n || 0;
      const n26 = focus26.c[i]?.n || 0;
      const p25 = (n25 / maxVcN) * 100;
      const p26 = (n26 / maxVcN) * 100;
      const dn = n26 - n25;
      const dCls = dn > 0 ? 'pos' : (dn < 0 ? 'neg' : '');
      return `<div class="rd-vc-bar-row">
        <div title="${esc(d.label)}">${esc(d.short)}</div>
        <div class="rd-vc-bar-track pair" title="Abu ${vcFocusMonth} 2025 · Biru ${vcFocusMonth} 2026">
          <div class="slot end"><i class="y25" style="width:${Math.max(p25, n25 ? 4 : 0).toFixed(1)}%"></i></div>
          <div class="slot"><i class="y26" style="width:${Math.max(p26, n26 ? 4 : 0).toFixed(1)}%"></i></div>
        </div>
        <div class="${dCls}">${n25}→${n26}</div>
      </div>`;
    }).join('');

    // Tabel matrix semua bulan: jumlah dealer per kelas
    const vcMatrixHead = `
      <tr>
        <th>Bulan</th>
        <th class="n">Aktif 25</th>
        <th class="n">Aktif 26</th>
        ${VC_DEFS.map(d => `<th class="n">${esc(d.short)} 25</th><th class="n">${esc(d.short)} 26</th>`).join('')}
      </tr>`;
    const vcMatrixBody = vcMonthRows.map(r => {
      const hi = r.month === vcFocusMonth ? ' style="background:#eef6ff"' : '';
      return `<tr${hi}>
        <td><strong>${esc(r.month)}</strong>${r.month === vcFocusMonth ? ' ●' : ''}</td>
        <td class="n">${r.s25.total}</td>
        <td class="n"><strong>${r.s26.total}</strong></td>
        ${VC_DEFS.map((_, i) => {
          const n25 = r.s25.c[i].n;
          const n26 = r.s26.c[i].n;
          const d = n26 - n25;
          const cls = d > 0 ? 'pos' : (d < 0 ? 'neg' : '');
          return `<td class="n">${n25}</td><td class="n ${cls}"><strong>${n26}</strong></td>`;
        }).join('')}
      </tr>`;
    }).join('') || `<tr><td colspan="${3 + VC_DEFS.length * 2}" class="empty">Tidak ada data bulanan</td></tr>`;

    const reasonCells = (r) => {
      const reasons = [];
      if (r.q25 && r.q26 < r.q25) reasons.push(`qty ${fmtPct((r.q26 - r.q25) / r.q25)}`);
      else if (r.q25 && r.q26 > r.q25) reasons.push(`qty ${fmtPct((r.q26 - r.q25) / r.q25)}`);
      if (r.asp25 && r.asp26 && r.asp26 < r.asp25 * 0.95) reasons.push(`ASP ${fmtPct((r.asp26 - r.asp25) / r.asp25)}`);
      else if (r.asp25 && r.asp26 && r.asp26 > r.asp25 * 1.05) reasons.push(`ASP ${fmtPct((r.asp26 - r.asp25) / r.asp25)}`);
      if ((r.ph26 || 0) + 0.001 < (r.ph25 || 0) - 0.02) reasons.push(`Prem+High ${fmtPct((r.ph26 || 0) - (r.ph25 || 0))}`);
      else if ((r.ph26 || 0) > (r.ph25 || 0) + 0.02) reasons.push(`Prem+High ${fmtPct((r.ph26 || 0) - (r.ph25 || 0))}`);
      if (r.topName25 && r.topName26 && r.topName25 !== r.topName26) reasons.push(`brand ${r.topName25}→${r.topName26}`);
      if (!reasons.length) reasons.push(`value ${fmtPct(r.yoy)}`);
      return reasons.join(' · ');
    };

    // Hanya 2 tabel rincian: turun & naik — berbasis filter bulan fokus (MoM tahun sama)
    const mapMoveRow = (r, tone) => {
      const from = r.c25 >= 0 ? VC_DEFS[r.c25].short : '—';
      const to = r.c26 >= 0 ? VC_DEFS[r.c26].short : '—';
      const pct = tone === 'neg'
        ? `<td class="n neg">${fmtPct(r.yoy)}</td>`
        : `<td class="n pos">${r.yoy >= 0 ? '+' : ''}${fmtPct(r.yoy)}</td>`;
      return `<tr>
        <td>${esc(r.name)}</td>
        <td>${esc(r.city || '—')}</td>
        <td class="n">${esc(from)}→${esc(to)}</td>
        <td class="n">${fmtIDR(r.a25)}</td>
        <td class="n">${fmtIDR(r.a26)}</td>
        ${pct}
        <td>${esc(reasonCells(r))}</td>
      </tr>`;
    };
    const emptyMove = (msg) => `<tr><td colspan="7" class="empty">${esc(msg)}</td></tr>`;
    const detailDownRows = momPrevMonth

  function renderReviewSales() {
    const el = document.getElementById('page-review-sales');
    if (!el) return;

    // Base filter: tanpa bulan lokal (untuk tools banding + grafik)
    const passBase = (r) => {
      if (r.depo === 'Unknown') return false;
      if (!matchMulti(state.brand, r.brand)) return false;
      if (!matchMulti(state.depo, r.depo)) return false;
      if (!matchMulti(state.quartal, r.quartal)) return false;
      if (!matchMulti(state.week, r.week)) return false;
      if (!matchMulti(revSalesFilter.year, r.year)) return false;
      if (!matchMulti(revSalesFilter.sales, r.sales)) return false;
      return true;
    };

    const allSalesNames = [...new Set((DATA.grain || []).map(r => r.sales).filter(Boolean))]
      .filter(s => s !== 'Unknown')
      .sort((a, b) => a.localeCompare(b, 'id'));
    const years = (DATA.meta?.years || ['2025', '2026']).map(String);
    const monthsMeta = DATA.meta?.months || MONTHS;

    revSalesFilter.sales = asArr(revSalesFilter.sales).filter(s => allSalesNames.includes(s));
    revSalesFilter.year = asArr(revSalesFilter.year);
    revSalesFilter.month = asArr(revSalesFilter.month);

    const baseGrain = (DATA.grain || []).filter(passBase);
    const baseDealer = (DATA.dealer_grain || []).filter(passBase);
    const grainRows = baseGrain.filter(r => matchMulti(revSalesFilter.month, r.month));
    const dealerRows = baseDealer.filter(r => matchMulti(revSalesFilter.month, r.month));

    let monthLabels = [...new Set(baseGrain.map(r => r.month).filter(Boolean))]
      .sort((a, b) => monthKey(a) - monthKey(b));
    if (!monthLabels.length) monthLabels = monthsMeta.slice();

    const yearsInData = [...new Set(baseGrain.map(r => String(r.year || '')).filter(Boolean))].sort();
    const yearsUse = !isAll(revSalesFilter.year)
      ? revSalesFilter.year.map(String)
      : (yearsInData.length ? yearsInData : years);

    if (!revCompare.focusYear || !yearsUse.includes(revCompare.focusYear)) {
      revCompare.focusYear = yearsUse[yearsUse.length - 1] || years[years.length - 1] || '2026';
    }

    const monthsWithData = monthLabels.filter(m =>
      baseGrain.some(r => r.month === m && String(r.year || '') === revCompare.focusYear)
    );
    if (!revCompare.focusMonth || !monthLabels.includes(revCompare.focusMonth)) {
      revCompare.focusMonth = monthsWithData[monthsWithData.length - 1] || monthLabels[monthLabels.length - 1] || 'Jul';
    }
    if (!revCompare.compareMonth || revCompare.compareMonth === revCompare.focusMonth) {
      const fi = MONTHS.indexOf(revCompare.focusMonth);
      revCompare.compareMonth = fi > 0 ? MONTHS[fi - 1] : (monthsWithData[monthsWithData.length - 2] || monthLabels[0] || 'Jun');
    }
    if (!['sales', 'dealer'].includes(revCompare.tab)) revCompare.tab = 'sales';

    const metricsOf = (year, month) => {
      const y = String(year), m = String(month);
      const g = baseGrain.filter(r => String(r.year || '') === y && r.month === m);
      const drows = baseDealer.filter(r => String(r.year || '') === y && r.month === m);
      const rev = g.reduce((a, r) => a + (Number(r.amt) || 0), 0);
      const boSet = new Set();
      const amtMap = new Map();
      const salesRev = new Map();
      const salesBo = new Map();
      const salesQvo = new Map();
      const salesDealerAmt = new Map();
      for (const r of drows) {
        const name = r.dealer || r.soldto;
        const sales = r.sales || 'Unknown';
        if (!name) continue;
        boSet.add(name);
        amtMap.set(name, (amtMap.get(name) || 0) + (Number(r.amt) || 0));
        if (!salesBo.has(sales)) salesBo.set(sales, new Set());
        salesBo.get(sales).add(name);
        if (!salesDealerAmt.has(sales)) salesDealerAmt.set(sales, new Map());
        const sm = salesDealerAmt.get(sales);
        sm.set(name, (sm.get(name) || 0) + (Number(r.amt) || 0));
      }
      for (const r of g) {
        const sales = r.sales || 'Unknown';
        salesRev.set(sales, (salesRev.get(sales) || 0) + (Number(r.amt) || 0));
      }
      let qvoN = 0;
      const qvoSet = new Set();
      for (const [name, amt] of amtMap) {
        if ((Number(amt) || 0) > QVO_THRESHOLD) { qvoN += 1; qvoSet.add(name); }
      }
      for (const [sales, sm] of salesDealerAmt) {
        let n = 0;
        for (const amt of sm.values()) if ((Number(amt) || 0) > QVO_THRESHOLD) n += 1;
        salesQvo.set(sales, n);
      }
      return {
        rev, bo: boSet.size, qvo: qvoN, boSet, qvoSet, amtMap,
        salesRev, salesBo: new Map([...salesBo].map(([s, set]) => [s, set.size])),
        salesQvo,
      };
    };

    const mf = metricsOf(revCompare.focusYear, revCompare.focusMonth);

    // Mode last3: pembanding = rata-rata 3 bulan sebelum fokus
    const last3Months = prevNMonths(revCompare.focusMonth, 3);
    if (revCompare.mode === 'last3' && last3Months.length) {
      revCompare.compareMonth = last3Months.join('+'); // label saja
    }
    const last3Metrics = last3Months.map(m => ({ month: m, ...metricsOf(revCompare.focusYear, m) }));
    const avgOf = (arr, key) => arr.length ? arr.reduce((a, x) => a + (Number(x[key]) || 0), 0) / arr.length : 0;

    // mc = single month metrics OR average of last 3
    let mc;
    let compareLabel;
    if (revCompare.mode === 'last3' && last3Metrics.length) {
      // rata-rata metrik 3 bulan
      const salesRevAvg = new Map();
      const salesBoAvg = new Map();
      const salesQvoAvg = new Map();
      const amtAvg = new Map();
      const boUnion = new Set();
      const qvoUnion = new Set();
      for (const mm of last3Metrics) {
        for (const [s, v] of mm.salesRev) salesRevAvg.set(s, (salesRevAvg.get(s) || 0) + v / last3Metrics.length);
        for (const [s, v] of mm.salesBo) salesBoAvg.set(s, (salesBoAvg.get(s) || 0) + v / last3Metrics.length);
        for (const [s, v] of mm.salesQvo) salesQvoAvg.set(s, (salesQvoAvg.get(s) || 0) + v / last3Metrics.length);
        for (const [n, v] of mm.amtMap) amtAvg.set(n, (amtAvg.get(n) || 0) + v / last3Metrics.length);
        for (const n of mm.boSet) boUnion.add(n);
        for (const n of mm.qvoSet) qvoUnion.add(n);
      }
      mc = {
        rev: avgOf(last3Metrics, 'rev'),
        bo: avgOf(last3Metrics, 'bo'),
        qvo: avgOf(last3Metrics, 'qvo'),
        boSet: boUnion,
        qvoSet: qvoUnion,
        amtMap: amtAvg,
        salesRev: salesRevAvg,
        salesBo: salesBoAvg,
        salesQvo: salesQvoAvg,
      };
      compareLabel = `Rata-rata 3 bln (${last3Months.slice().reverse().join('–')})`;
    } else {
      revCompare.mode = 'single';
      mc = metricsOf(revCompare.focusYear, revCompare.compareMonth);
      compareLabel = revCompare.compareMonth;
    }

    const dRev = mf.rev - mc.rev;
    const dBo = mf.bo - mc.bo;
    const dQvo = mf.qvo - mc.qvo;
    const pct = (d, base) => base ? d / base : (d ? (d > 0 ? 1 : -1) : 0);
    const pRev = pct(dRev, mc.rev);
    const pBo = pct(dBo, mc.bo);
    const pQvo = pct(dQvo, mc.qvo);
    const arrow = (d) => d > 0 ? '▲' : (d < 0 ? '▼' : '●');
    const clsDelta = (d) => d > 0 ? 'up' : (d < 0 ? 'down' : '');

    const allSalesKeys = new Set([...mf.salesRev.keys(), ...mc.salesRev.keys(), ...mf.salesBo.keys(), ...mc.salesBo.keys()]);
    const salesRows = [...allSalesKeys].map(s => {
      const revF = mf.salesRev.get(s) || 0, revC = mc.salesRev.get(s) || 0;
      const boF = mf.salesBo.get(s) || 0, boC = mc.salesBo.get(s) || 0;
      const qF = mf.salesQvo.get(s) || 0, qC = mc.salesQvo.get(s) || 0;
      return { sales: s, revF, revC, dRev: revF - revC, boF, boC, dBo: boF - boC, qF, qC, dQvo: qF - qC };
    }).sort((a, b) => a.dRev - b.dRev);

    const dealerKeys = new Set([...mf.amtMap.keys(), ...mc.amtMap.keys()]);
    const dealerRowsCmp = [...dealerKeys].map(name => {
      const aF = mf.amtMap.get(name) || 0, aC = mc.amtMap.get(name) || 0;
      const qF = aF > QVO_THRESHOLD, qC = aC > QVO_THRESHOLD;
      let status = 'tetap';
      if (qC && !qF) status = 'hilang-qvo';
      else if (!qC && qF) status = 'jadi-qvo';
      else if ((mc.boSet.has(name) || aC > 0) && !mf.boSet.has(name) && aF <= 0) status = 'hilang-bo';
      else if (!mc.boSet.has(name) && mf.boSet.has(name)) status = 'baru-bo';
      return { dealer: name, aF, aC, dAmt: aF - aC, qF, qC, status };
    }).sort((a, b) => a.dAmt - b.dAmt);

    const lostQvo = dealerRowsCmp.filter(d => d.status === 'hilang-qvo');
    const gainedQvo = dealerRowsCmp.filter(d => d.status === 'jadi-qvo');
    const topDropSales = salesRows.filter(r => r.dRev < 0).slice(0, 5);

    const insights = [];
    const vsLabel = revCompare.mode === 'last3'
      ? `${esc(revCompare.focusMonth)} vs rata-rata 3 bln terakhir (${esc(last3Months.slice().reverse().join(', '))}) ${esc(revCompare.focusYear)}`
      : `${esc(revCompare.focusMonth)} vs ${esc(revCompare.compareMonth)} ${esc(revCompare.focusYear)}`;
    insights.push(`<strong>${vsLabel}</strong>`);
    insights.push(`Revenue ${arrow(dRev)} <strong>${fmtIDR(dRev)}</strong> (${(pRev * 100).toFixed(1)}%) · BO ${arrow(dBo)} <strong>${fmtN(dBo)}</strong> · QVO ${arrow(dQvo)} <strong>${fmtN(dQvo)}</strong>`);
    if (revCompare.mode === 'last3' && last3Metrics.length) {
      insights.push(`Rincian 3 bln: ${last3Metrics.slice().reverse().map(x =>
        `<strong>${esc(x.month)}</strong> Rev ${fmtIDR(x.rev)} · BO ${fmtN(x.bo)} · QVO ${fmtN(x.qvo)}`
      ).join(' · ')}`);
    }
    if (topDropSales.length) {
      insights.push(`Penurun revenue terbesar: <strong>${topDropSales.slice(0, 3).map(s => esc(s.sales)).join(', ')}</strong>`);
    }
    if (lostQvo.length) {
      insights.push(`<strong>${fmtN(lostQvo.length)}</strong> dealer kehilangan QVO vs pembanding (ambang &gt; ${fmtN(QVO_THRESHOLD)})`);
    }
    if (gainedQvo.length) {
      insights.push(`<strong>${fmtN(gainedQvo.length)}</strong> dealer baru masuk QVO`);
    }
    if (dBo < 0 && dQvo < 0 && Math.abs(dQvo) >= Math.abs(dBo) * 0.7) {
      insights.push(`Indikasi: penurunan QVO sejalan dengan BO — cek jangkauan dealer & value.`);
    } else if (dBo >= 0 && dQvo < 0) {
      insights.push(`Indikasi: BO stabil/naik tapi QVO turun — problem value per dealer (banyak di bawah ambang).`);
    } else if (dBo < 0 && dQvo >= 0) {
      insights.push(`Indikasi: BO turun tapi QVO aman — konsentrasi di dealer besar tetap kuat.`);
    }

    const revMap = new Map();
    for (const r of baseGrain) {
      const y = String(r.year || yearsUse[0] || '');
      const m = r.month || 'Unknown';
      if (!revMap.has(y)) revMap.set(y, new Map());
      revMap.get(y).set(m, (revMap.get(y).get(m) || 0) + (Number(r.amt) || 0));
    }
    const boMapAll = new Map();
    const amtMapAll = new Map();
    for (const r of baseDealer) {
      const y = String(r.year || yearsUse[0] || '');
      const m = r.month || 'Unknown';
      const name = r.dealer || r.soldto;
      if (!name) continue;
      if (!boMapAll.has(y)) boMapAll.set(y, new Map());
      if (!boMapAll.get(y).has(m)) boMapAll.get(y).set(m, new Set());
      boMapAll.get(y).get(m).add(name);
      if (!amtMapAll.has(y)) amtMapAll.set(y, new Map());
      if (!amtMapAll.get(y).has(m)) amtMapAll.get(y).set(m, new Map());
      const dm = amtMapAll.get(y).get(m);
      dm.set(name, (dm.get(name) || 0) + (Number(r.amt) || 0));
    }

    const chartMonths = !isAll(revSalesFilter.month)
      ? monthLabels.filter(m => matchMulti(revSalesFilter.month, m))
      : monthLabels;
    const chartMonthLabels = chartMonths.length ? chartMonths : monthLabels;

    const seriesRev = Object.fromEntries(yearsUse.map(y => [
      y, chartMonthLabels.map(m => (revMap.get(y)?.get(m) || 0) / 1e9)
    ]));
    const seriesBo = Object.fromEntries(yearsUse.map(y => [
      y, chartMonthLabels.map(m => boMapAll.get(y)?.get(m)?.size || 0)
    ]));
    const seriesQvo = Object.fromEntries(yearsUse.map(y => [
      y,
      chartMonthLabels.map(m => {
        const dm = amtMapAll.get(y)?.get(m);
        if (!dm) return 0;
        let n = 0;
        for (const amt of dm.values()) if ((Number(amt) || 0) > QVO_THRESHOLD) n += 1;
        return n;
      })
    ]));

    const totRev = grainRows.reduce((a, r) => a + (Number(r.amt) || 0), 0);
    const everbill = new Set();
    const qvoEver = new Set();
    const amFilter = new Map();
    for (const r of dealerRows) {
      const name = r.dealer || r.soldto;
      if (!name) continue;
      everbill.add(name);
      amFilter.set(name, (amFilter.get(name) || 0) + (Number(r.amt) || 0));
    }
    for (const [name, amt] of amFilter) if (amt > QVO_THRESHOLD) qvoEver.add(name);

    const salesLabel = fmtMulti(revSalesFilter.sales, 'Semua Sales', 2);
    const yearColorsRev = { '2025': '#64748b', '2026': '#0B2F6B' };
    const yearColorsBo = { '2025': '#94a3b8', '2026': '#1d4ed8' };
    const yearColorsQvo = { '2025': '#a78bfa', '2026': '#7c3aed' };

    const monthOpts = (selected) =>
      monthsMeta.map(m => `<option value="${esc(m)}" ${selected === m ? 'selected' : ''}>${esc(m)}</option>`).join('');
    const yearOpts = (selected) =>
      yearsUse.map(y => `<option value="${esc(y)}" ${selected === y ? 'selected' : ''}>${esc(y)}</option>`).join('');

    const fmtDeltaIdr = (n) => (n > 0 ? '+' : '') + fmtIDR(n);
    const fmtDeltaN = (n) => (n > 0 ? '+' : '') + fmtN(n);

    const cmpCol = revCompare.mode === 'last3' ? 'Avg 3 bln' : compareLabel;
    const tableHtml = revCompare.tab === 'sales'
      ? `<table class="cmp-tbl">
          <thead><tr>
            <th>Sales</th>
            <th class="n">${esc(cmpCol)}</th>
            <th class="n">${esc(revCompare.focusMonth)}</th>
            <th class="n">Δ Revenue</th>
            <th class="n">Δ BO</th>
            <th class="n">Δ QVO</th>
          </tr></thead>
          <tbody>
            ${salesRows.slice(0, 15).map(r => `<tr data-kind="sales" data-name="${esc(r.sales)}">
              <td><strong>${esc(r.sales)}</strong></td>
              <td class="n">${fmtIDR(r.revC)}</td>
              <td class="n">${fmtIDR(r.revF)}</td>
              <td class="n ${r.dRev < 0 ? 'neg' : (r.dRev > 0 ? 'pos' : '')}">${fmtDeltaIdr(r.dRev)}</td>
              <td class="n ${r.dBo < 0 ? 'neg' : (r.dBo > 0 ? 'pos' : '')}">${fmtDeltaN(r.dBo)}</td>
              <td class="n ${r.dQvo < 0 ? 'neg' : (r.dQvo > 0 ? 'pos' : '')}">${fmtDeltaN(r.dQvo)}</td>
            </tr>`).join('') || `<tr><td colspan="6" class="empty">Tidak ada data</td></tr>`}
          </tbody>
        </table>`
      : `<table class="cmp-tbl">
          <thead><tr>
            <th>Dealer</th>
            <th class="n">${esc(cmpCol)}</th>
            <th class="n">${esc(revCompare.focusMonth)}</th>
            <th class="n">Δ Value</th>
            <th>Status QVO</th>
          </tr></thead>
          <tbody>
            ${dealerRowsCmp.slice(0, 20).map(r => {
              const stLabel = r.status === 'hilang-qvo' ? 'Hilang QVO'
                : r.status === 'jadi-qvo' ? 'Jadi QVO'
                : r.status === 'hilang-bo' ? 'Hilang BO'
                : r.status === 'baru-bo' ? 'Baru BO' : 'Tetap';
              return `<tr data-kind="dealer" data-name="${esc(r.dealer)}">
                <td><strong>${esc(r.dealer)}</strong></td>
                <td class="n">${fmtIDR(r.aC)}</td>
                <td class="n">${fmtIDR(r.aF)}</td>
                <td class="n ${r.dAmt < 0 ? 'neg' : (r.dAmt > 0 ? 'pos' : '')}">${fmtDeltaIdr(r.dAmt)}</td>
                <td>${esc(stLabel)}</td>
              </tr>`;
            }).join('') || `<tr><td colspan="5" class="empty">Tidak ada data</td></tr>`}
          </tbody>
        </table>`;

        <div class="section-head">

            <h3>Review Sales · Achievement</h3>

            <div class="v" style="color:#fff;font-weight:900;font-size:1.05rem">${fmtN(qvoEver.size)}</div>
          </div>
          <div class="hero-stat" style="background:#0d9488;border-radius:12px;padding:10px">

        <div class="filter-row cols-3">
