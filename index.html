            <label>Bulan fokus (yang di-review)</label>
            <select id="cmpFocusMonth">${monthOpts(revCompare.focusMonth)}</select>
          </div>
          <div class="field">
            <label>Bandingkan dengan bulan ${revCompare.mode === 'last3' ? '(nonaktif · mode 3 bln)' : ''}</label>
            <select id="cmpCompareMonth" ${revCompare.mode === 'last3' ? 'disabled' : ''}>${monthOpts(revCompare.mode === 'last3' ? (last3Months[0] || revCompare.compareMonth) : revCompare.compareMonth)}</select>
          </div>
        </div>
        <div class="sort-pills" style="margin-top:8px">
          <button type="button" class="sort-pill ${revCompare.mode === 'single' ? 'on' : ''}" id="cmpPresetPrev">vs Bulan lalu</button>
          <button type="button" class="sort-pill" id="cmpPreset2">vs 2 bulan lalu</button>
          <button type="button" class="sort-pill ${revCompare.mode === 'last3' ? 'on' : ''}" id="cmpPreset3">vs 3 bulan terakhir</button>
          <button type="button" class="sort-pill" id="cmpSwap">Tukar bulan</button>
        </div>
        ${revCompare.mode === 'last3' && last3Metrics.length ? `
        <div class="hero-stats solid cols-4" style="margin-top:10px">
          ${last3Metrics.slice().reverse().map(x => `
            <div class="hero-stat" style="background:#334155">
              <div class="l">${esc(x.month)} ${esc(revCompare.focusYear)}</div>
              <div class="v" style="font-size:.85rem">R ${fmtIDR(x.rev)}</div>
              <div class="l" style="margin-top:4px">BO ${fmtN(x.bo)} · QVO ${fmtN(x.qvo)}</div>
            </div>`).join('')}
          <div class="hero-stat" style="background:#0B2F6B">
            <div class="l">Rata-rata 3 bln</div>
            <div class="v" style="font-size:.85rem">R ${fmtIDR(mc.rev)}</div>
            <div class="l" style="margin-top:4px">BO ${fmtN(Math.round(mc.bo))} · QVO ${fmtN(Math.round(mc.qvo))}</div>
          </div>
        </div>` : ''}

        <div class="cmp-delta-grid">
          <div class="cmp-delta-card rev ${clsDelta(dRev)}">
            <div class="ttl">Achievement Revenue</div>
            <div class="pair">
              <div class="box"><div class="l">${esc(cmpCol)}</div><div class="v">${fmtIDR(mc.rev)}</div></div>
              <div class="box"><div class="l">${esc(revCompare.focusMonth)}</div><div class="v">${fmtIDR(mf.rev)}</div></div>
            </div>
            <div class="delta">${arrow(dRev)} ${fmtDeltaIdr(dRev)} <span class="pct">${(pRev * 100).toFixed(1)}%</span></div>
          </div>
          <div class="cmp-delta-card bo ${clsDelta(dBo)}">
            <div class="ttl">Achievement BO</div>
            <div class="pair">
              <div class="box"><div class="l">${esc(cmpCol)}</div><div class="v">${fmtN(Math.round(mc.bo))}</div></div>
              <div class="box"><div class="l">${esc(revCompare.focusMonth)}</div><div class="v">${fmtN(mf.bo)}</div></div>
            </div>
            <div class="delta">${arrow(dBo)} ${fmtDeltaN(Math.round(dBo))} dealer <span class="pct">${(pBo * 100).toFixed(1)}%</span></div>
          </div>
          <div class="cmp-delta-card qvo ${clsDelta(dQvo)}">
            <div class="ttl">Achievement QVO</div>
            <div class="pair">
              <div class="box"><div class="l">${esc(cmpCol)}</div><div class="v">${fmtN(Math.round(mc.qvo))}</div></div>
              <div class="box"><div class="l">${esc(revCompare.focusMonth)}</div><div class="v">${fmtN(mf.qvo)}</div></div>
            </div>
            <div class="delta">${arrow(dQvo)} ${fmtDeltaN(Math.round(dQvo))} dealer <span class="pct">${(pQvo * 100).toFixed(1)}%</span></div>
          </div>
        </div>

        <div class="cmp-insight">${insights.map(x => `<div style="margin:4px 0">• ${x}</div>`).join('')}</div>

        <div class="cmp-tabs">
          <button type="button" class="cmp-tab ${revCompare.tab === 'sales' ? 'on' : ''}" data-tab="sales">Penyebab per Sales</button>
          <button type="button" class="cmp-tab ${revCompare.tab === 'dealer' ? 'on' : ''}" data-tab="dealer">Penyebab per Dealer</button>
        </div>
        <p style="font-size:.72rem;color:var(--muted);font-weight:700;margin:4px 0 0">
          Urut penurun terbesar · klik baris → Menu Sales (filter ${esc(revCompare.focusMonth)} ${esc(revCompare.focusYear)})
        </p>
        <div class="cmp-table-wrap" id="cmpTableWrap">${tableHtml}</div>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <h3>Achievement Revenue</h3>
            <p>Total Amount No Tax per bulan · klik titik → Sales · ${esc(salesLabel)}</p>
          </div>
          <span class="badge-soft">${fmtIDR(totRev)}</span>
        </div>
        <div class="chart-box"><canvas id="cRevSalesRevenue"></canvas></div>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <h3>Achievement BO</h3>
            <p>Jumlah dealer bertransaksi per bulan · klik titik → Sales · ${esc(salesLabel)}</p>
          </div>
          <span class="badge-soft">${fmtN(everbill.size)} EVERBILL</span>
        </div>
        <div class="chart-box"><canvas id="cRevSalesBo"></canvas></div>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <h3>Achievement QVO</h3>
            <p>Dealer QVO per bulan · Nett No Tax &gt; ${fmtN(QVO_THRESHOLD)} · klik titik → Sales</p>
          </div>
          <span class="badge-soft">${fmtN(qvoEver.size)} EVERBILL QVO</span>
        </div>
        <div class="chart-box"><canvas id="cRevSalesQvo"></canvas></div>
      </section>
    `;

    const mkYearDs = (seriesMap, colors, asRevenue = false) => yearsUse.map(y => {
      const st = yearLineStyle(y);
      const col = colors[y] || '#1d4ed8';
      return {
        label: String(y),
        data: seriesMap[y] || chartMonthLabels.map(() => 0),
        borderColor: col,
        backgroundColor: col,
        borderWidth: st.borderWidth,
        borderDash: st.borderDash,
        pointRadius: 4,
        pointHoverRadius: 7,
        pointStyle: st.pointStyle,
        pointBackgroundColor: col,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        fill: false,
        tension: 0.35,
        datalabels: {
          align: 'top',
          anchor: 'end',
          color: '#0b1f3a',
          font: { weight: '900', size: 10 },
          formatter: (v) => {
            if (!v) return '';
            return asRevenue ? Number(v).toFixed(1) : fmtN(v);
          }
        }
      };
    });

    const baseOpts = (yTitle, isRev = false, metric = 'REVENUE') => ({
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 18, right: 10 } },
      interaction: { mode: 'nearest', intersect: true },
      onHover: (evt, elements) => {
        const t = evt?.native?.target;
        if (t) t.style.cursor = elements?.length ? 'pointer' : 'default';
      },
      onClick: (evt, elements, chart) => {
        if (!elements || !elements.length) return;
        const hit = elements[0];
        const ds = chart.data.datasets[hit.datasetIndex];
        const month = chart.data.labels[hit.index];
        const year = String(ds.label || '');
        const value = ds.data[hit.index];
        openSalesFromReviewPoint({
          metric,
          month,
          year,
          value,
          sales: revSalesFilter.sales,
        });
      },
      plugins: {
        legend: { display: true, labels: { color: '#334155', boxWidth: 12, font: { size: 11, weight: '800' } } },
        datalabels: { clamp: true },
        tooltip: {
          callbacks: {
            title: (items) => {
              const it = items?.[0];
              if (!it) return '';
              return `${it.label} · ${it.dataset.label} · klik untuk buka Sales`;
            },
            label: (c) => isRev
              ? ` ${c.dataset.label}: ${fmtIDR((c.raw || 0) * 1e9)}`
              : ` ${c.dataset.label}: ${fmtN(c.raw || 0)} dealer`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#334155', font: { weight: '800' } },
          grid: { display: false },
          title: { display: true, text: 'Bulan', color: '#5b6b82', font: { weight: '700', size: 11 } }
        },
        y: {
          beginAtZero: true,
          ticks: { color: '#334155', font: { weight: '700' }, precision: isRev ? undefined : 0 },
          grid: { color: 'rgba(148,163,184,.22)' },
          title: { display: true, text: yTitle, color: '#5b6b82', font: { weight: '700', size: 11 } }
        }
      }
    });

    destroyChart('revSalesRevenue');
    destroyChart('revSalesBo');
    destroyChart('revSalesQvo');

    const withClickablePoints = (datasets) => datasets.map(ds => ({
      ...ds,
      pointRadius: 6,
      pointHoverRadius: 9,
      pointHitRadius: 14,
    }));

    charts.revSalesRevenue = new Chart(document.getElementById('cRevSalesRevenue'), {
      type: 'line',
      data: { labels: chartMonthLabels, datasets: withClickablePoints(mkYearDs(seriesRev, yearColorsRev, true)) },
      options: baseOpts('Revenue (Rp Miliar)', true, 'REVENUE')
    });
    charts.revSalesBo = new Chart(document.getElementById('cRevSalesBo'), {
      type: 'line',
      data: { labels: chartMonthLabels, datasets: withClickablePoints(mkYearDs(seriesBo, yearColorsBo, false)) },
      options: baseOpts('Jumlah Dealer (BO)', false, 'BO')
    });
    charts.revSalesQvo = new Chart(document.getElementById('cRevSalesQvo'), {
      type: 'line',
      data: { labels: chartMonthLabels, datasets: withClickablePoints(mkYearDs(seriesQvo, yearColorsQvo, false)) },
      options: baseOpts('Jumlah Dealer QVO', false, 'QVO')
    });

    mountMultiSelect(document.getElementById('revSalesName'), {
      options: allSalesNames,
      selected: revSalesFilter.sales,
      allLabel: 'Semua Sales',
      searchPlaceholder: 'Ketik nama sales…',
      onChange: (vals) => { revSalesFilter.sales = vals; renderReviewSales(); },
    });
    mountMultiSelect(document.getElementById('revSalesYear'), {
      options: years,
      selected: revSalesFilter.year,
      allLabel: 'Semua Tahun',
      searchPlaceholder: 'Cari tahun…',
      onChange: (vals) => { revSalesFilter.year = vals; renderReviewSales(); },
    });
    mountMultiSelect(document.getElementById('revSalesMonth'), {
      options: monthsMeta,
      selected: revSalesFilter.month,
      allLabel: 'Semua Bulan',
      searchPlaceholder: 'Cari bulan…',
      onChange: (vals) => { revSalesFilter.month = vals; renderReviewSales(); },
    });

    document.getElementById('cmpFocusYear').onchange = (e) => {

      renderReviewSales();
    };
    document.getElementById('cmpFocusMonth').onchange = (e) => {
      revCompare.focusMonth = e.target.value;
      renderReviewSales();
    };
    document.getElementById('cmpCompareMonth').onchange = (e) => {
      revCompare.compareMonth = e.target.value;
      renderReviewSales();
    };
    document.getElementById('cmpPresetPrev').onclick = () => {
      revCompare.mode = 'single';
      const fi = MONTHS.indexOf(revCompare.focusMonth);
      revCompare.compareMonth = fi > 0 ? MONTHS[fi - 1] : revCompare.compareMonth;
      renderReviewSales();
    };
    document.getElementById('cmpPreset2').onclick = () => {
      revCompare.mode = 'single';
      const fi = MONTHS.indexOf(revCompare.focusMonth);
      revCompare.compareMonth = fi > 1 ? MONTHS[fi - 2] : (fi > 0 ? MONTHS[fi - 1] : revCompare.compareMonth);
      renderReviewSales();
    };
    document.getElementById('cmpPreset3').onclick = () => {
      const prev = prevNMonths(revCompare.focusMonth, 3);
      if (!prev.length) {
        toast('Bulan fokus tidak punya 3 bulan sebelumnya di kalender');
        return;
      }
      revCompare.mode = 'last3';
      renderReviewSales();
      toast('Bandingkan vs rata-rata 3 bln: ' + prev.slice().reverse().join(', '));
    };
    document.getElementById('cmpSwap').onclick = () => {
      if (revCompare.mode === 'last3') {
        toast('Mode 3 bulan: tukar nonaktif — pilih vs Bulan lalu dulu');
        return;
      }
      const a = revCompare.focusMonth;
      revCompare.focusMonth = revCompare.compareMonth;
      revCompare.compareMonth = a;
      renderReviewSales();
    };
    document.querySelectorAll('.cmp-tab').forEach(btn => {
      btn.onclick = () => {
        revCompare.tab = btn.dataset.tab || 'sales';
        renderReviewSales();
      };
    });
    document.querySelectorAll('#cmpTableWrap tr[data-kind]').forEach(tr => {
      tr.onclick = () => {
        const kind = tr.getAttribute('data-kind');
        const name = tr.getAttribute('data-name') || '';
        if (kind === 'sales' && name) {
          const row = salesRows.find(s => s.sales === name);
          openSalesFromReviewPoint({
            metric: (row && row.dQvo < 0 && Math.abs(row.dQvo) >= Math.abs(row.dBo || 0)) ? 'QVO' : 'REVENUE',
            month: revCompare.focusMonth,
            year: revCompare.focusYear,
            value: row ? row.revF / 1e9 : 0,
            sales: [name],
          });
        } else {
          openSalesFromReviewPoint({
            metric: 'QVO',
            month: revCompare.focusMonth,
            year: revCompare.focusYear,
            value: mf.qvo,
            sales: revSalesFilter.sales,
          });
        }
      };
    });
  }

  function renderOutlet(host) {
    const el = host || document.getElementById('salesOutletHost');
    if (!el) return;
    let dealers = filteredDealer();
    // multi sales filter (selectedSalesFilter) atau single selectedSales
    if (!isAll(selectedSalesFilter)) {
      dealers = dealers.filter(r => matchMulti(selectedSalesFilter, r.sales));
    } else if (selectedSales) {
      dealers = dealers.filter(r => r.sales === selectedSales);
    }

    // Nilai Achievement SKU (menu Sales) = Total Nett Amount with Tax
    // QVO dealer = value with tax ≥ min. Rp 20.000.000 (sama aturan menu Sales)
    const rowAmtTax = (r) => {
      if (r.amt_tax != null && r.amt_tax !== '') return Number(r.amt_tax) || 0;
      // fallback lama jika data belum di-rebuild
      return Number(r.amt) || 0;
    };
    const skuAmtTax = (it) => {
      if (it.amt_tax != null && it.amt_tax !== '') return Number(it.amt_tax) || 0;
      return Number(it.amt) || 0;
    };

    // aggregate dealer (BO) + merge SKU (Alias) — normalisasi tanpa warna
    // simpan amt (with tax) + amtNoTax (untuk deep-link QVO dari Review Sales)
    const dMap = new Map();
    for (const r of dealers) {
      const name = r.dealer || r.soldto;
      const brand = r.brand || (isAll(state.brand) ? 'MULTI' : (state.brand[0] || 'MULTI'));
      const k = brand + '||' + r.sales + '||' + name;
      if (!dMap.has(k)) dMap.set(k, {
        sales:r.sales, dealer:name, loc:r.loc||r.alias||'', depo:r.depo, brand,
        qty:0, amt:0, amtNoTax:0, skuMap:new Map()
      });
      const o = dMap.get(k);
      o.qty += r.qty;
      o.amt += rowAmtTax(r);
      o.amtNoTax += Number(r.amt) || 0;
      o.depo = r.depo;
      if (r.loc) o.loc = r.loc;
      else if (r.alias) o.loc = r.alias;
      if (Array.isArray(r.sku_items)) {
        for (const it of r.sku_items) {
          const sk = normalizeSku(r.brand || brand, it.sku || it.unit || 'Unknown');
          if (!o.skuMap.has(sk)) o.skuMap.set(sk, {unit:sk, qty:0, amt:0});
          const u = o.skuMap.get(sk);
          u.qty += it.qty || 0;
          u.amt += skuAmtTax(it);
        }
      }
    }

    // Deep-link dari Review QVO pakai threshold 18.081.081 No Tax (sama grafik Review)
    const fromReviewQvo = salesDeepLink && salesDeepLink.metric === 'QVO';
    let list = [...dMap.entries()].map(([k, v]) => {
      const unitsList = [...v.skuMap.values()].sort((a,b)=>b.qty-a.qty);
      const qvo = fromReviewQvo
        ? ((Number(v.amtNoTax) || 0) > QVO_THRESHOLD)
        : isSalesQvo(v.amt);
      return { ...v, key:k, units: unitsList, skuCount: unitsList.length, qvo };
    }).sort((a,b)=>b.amt-a.amt);

    // QVO multi: SUDAH / BELUM
    if (!isAll(selectedQvo)) {
      list = list.filter(x => {
        if (x.qvo && matchMulti(selectedQvo, 'SUDAH')) return true;
        if (!x.qvo && matchMulti(selectedQvo, 'BELUM')) return true;
        return false;
      });
    }
    // SKU class multi
    if (!isAll(selectedSkuClass)) {
      list = list.filter(x => selectedSkuClass.some(cls => matchSkuClass(x.skuCount, cls)));
    }

    const tot = list.reduce((s,x)=>s+x.amt,0);
    const qvoCount = list.filter(x => x.qvo).length;
    const brandLabel = isAll(state.brand) ? 'Semua Brand' : fmtMulti(state.brand, '', 3);
    const allSales = [...new Set(filteredDealer().map(r=>r.sales))].sort((a,b)=>a.localeCompare(b));
    const skuClassOpts = [
      { v: '0-1', t: 'SKU 0–1' },
      { v: '2-3', t: 'SKU 2–3' },
      { v: '4-6', t: 'SKU 4–6' },
      { v: '7-10', t: 'SKU 7–10' },
      { v: 'gt10', t: 'SKU >10' },
    ];
    const qvoOpts = [
      { v: 'SUDAH', t: 'Sudah QVO' },
      { v: 'BELUM', t: 'Belum QVO' },
    ];

    el.innerHTML = `
      <section class="section" style="margin-top:14px;border:2px solid #b7d4ef">
        <div class="section-head">
          <div>
            <h3>Achievement SKU · Outlet · ${esc(brandLabel)}</h3>
            <p>Nilai = <strong>Nett with Tax</strong> · QVO ≥ <strong>${fmtIDR(QVO_THRESHOLD_SALES)}</strong> · SKU lengkap · ${fmtN(list.length)} BO
              ${salesDeepLink && (salesDeepLink.metric === 'QVO' || salesDeepLink.metric === 'BO')
                ? ` · <strong style="color:var(--tam)">Detail ${esc(salesDeepLink.metric)} ${esc(salesDeepLink.month)} ${esc(salesDeepLink.year)} · ${fmtN(salesDeepLink.value)} dealer</strong>`
                : ''}
            </p>
          </div>
          <span class="badge-soft">SKU</span>
        </div>
        <div class="filter-row cols-4">
          <div class="field">
            <label>Filter Bulan (multi + cari)</label>
            <div id="outletMonthList"></div>
          </div>
          <div class="field">
            <label>Filter nama sales (multi + cari)</label>
            <div id="outletSalesList"></div>
          </div>
          <div class="field">
            <label>Klasifikasi QVO (multi)</label>
            <div id="outletQvoSel"></div>
          </div>
          <div class="field">
            <label>Klasifikasi SKU (multi)</label>
            <div id="outletSkuClassSel"></div>
          </div>
        </div>
        <div class="hero-stats solid cols-4" style="margin-bottom:12px">
          <div class="hero-stat" style="background:#0B2F6B"><div class="l">Nilai (With Tax)</div><div class="v">${fmtIDR(tot)}</div></div>
          <div class="hero-stat" style="background:#00A3E0"><div class="l">Qty</div><div class="v">${fmtN(list.reduce((s,x)=>s+x.qty,0))}</div></div>
          <div class="hero-stat" style="background:#0d9488"><div class="l">BO</div><div class="v">${fmtN(list.length)}</div></div>
          <div class="hero-stat" style="background:#7c3aed"><div class="l">Achievement QVO</div><div class="v">${fmtN(qvoCount)}</div></div>
        </div>
        <div class="legend-sam-zero">${fromReviewQvo
          ? `QVO (dari Review Sales) = Nett No Tax &gt; ${fmtN(QVO_THRESHOLD)} · ${fmtN(list.length)} dealer di titik grafik`
          : `QVO dealer = value Nett with Tax ≥ ${fmtIDR(QVO_THRESHOLD_SALES)} · selaras menu Sales`}</div>
        <div class="outlet-list" id="outletList"></div>
      </section>
    `;

    mountMultiSelect(document.getElementById('outletMonthList'), {
      options: DATA?.meta?.months || MONTHS,
      selected: state.month,
      allLabel: 'Semua Bulan',
      searchPlaceholder: 'Cari bulan…',
      onChange: (vals) => { state.month = vals; remountGlobalSlicers(); apply(); },
    });
    mountMultiSelect(document.getElementById('outletSalesList'), {
      options: allSales,
      selected: selectedSalesFilter,
      allLabel: 'Semua Sales',
      searchPlaceholder: 'Ketik nama sales…',
      onChange: (vals) => {
        selectedSalesFilter = vals;
        if (vals.length === 1) selectedSales = vals[0];
        else if (!vals.length) selectedSales = null;
        renderOutlet(el);
      },
    });
    mountMultiSelect(document.getElementById('outletQvoSel'), {
      options: qvoOpts,
      selected: selectedQvo,
      allLabel: 'Semua (Sudah + Belum)',
      searchPlaceholder: 'Cari status QVO…',
      onChange: (vals) => { selectedQvo = vals; renderOutlet(el); },
    });
    mountMultiSelect(document.getElementById('outletSkuClassSel'), {
      options: skuClassOpts,
      selected: selectedSkuClass,
      allLabel: 'Semua klasifikasi SKU',
      searchPlaceholder: 'Cari kelas SKU…',
      onChange: (vals) => { selectedSkuClass = vals; renderOutlet(el); },
    });

    document.getElementById('outletList').innerHTML = list.map((x,i) => {
      return `<div class="outlet-card">
        <div class="row1">
          <div>
            <div class="dealer">#${i+1} ${esc(x.dealer)}</div>
            <div class="loc">${esc(x.brand)} · ${esc(x.depo)}${x.loc ? ' · '+esc(x.loc) : ''} · ${esc(x.sales)}</div>
            <span class="qvo-badge ${x.qvo ? 'yes' : 'no'}">${x.qvo ? '✓ Sudah QVO' : 'Belum QVO'}</span>
          </div>
          <div style="text-align:right">
            <div class="amt">${fmtIDR(x.amt)}</div>
            <div style="font-size:.72rem;color:var(--muted);font-weight:700">Qty ${fmtN(x.qty)} · <strong>SKU ${fmtN(x.skuCount)}</strong></div>
          </div>
        </div>
        <div class="unit-box">
          <div class="uh">Type SKU · ${fmtN(x.skuCount)} item (type · RAM/internal)${x.skuCount > 10 ? ' · top 10' : ''}</div>
          ${x.units.length ? (() => {
            const maxShow = 10;
            const shown = x.units.slice(0, maxShow);
            const rest = x.units.length - shown.length;
            return shown.map(u => `
            <div class="unit-row">
              <div class="un">${esc(u.unit)}</div>
              <div class="uq">Qty ${fmtN(u.qty)}</div>
              <div class="ua">${fmtIDR(u.amt)}</div>
            </div>`).join('') + (rest > 0
              ? `<div class="unit-more">+${fmtN(rest)} Lainnya</div>`
              : '');
          })() : `<div class="unit-more">Tidak ada detail SKU</div>`}
        </div>
      </div>`;
    }).join('') || `<div class="empty">Tidak ada dealer (BO) pada filter ini</div>`;
  }

  boot();
  </script>
</body>
</html>
